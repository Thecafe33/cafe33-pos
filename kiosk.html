<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Café Kiosk</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Google+Sans+Display:wght@400;700&family=Google+Sans+Text:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #ffffff;
    --surface:   #ffffff;
    --surface2:  #f5f5f5;
    --border:    #e8e8e8;
    --border2:   #d0d0d0;
    --accent:    #b5822a;
    --text:      #1a1714;
    --text2:     #6b6558;
    --text3:     #a89e90;
    --red:       #c0392b;
    --red-bg:    #fdf0ee;
    --green:     #2e7d32;
    --green-bg:  #edf7ee;
    --amber:     #b5822a;
    --amber-bg:  #fdf3e0;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100vw; height: 100vh;
    overflow: hidden;
    background: var(--bg);
    color: var(--text);
    font-family: 'Google Sans Text', 'Google Sans', sans-serif;
    user-select: none;
    -webkit-user-select: none;
    pointer-events: none;
    touch-action: none;
    cursor: none;
  }

  #app {
    display: flex;
    width: 100vw; height: 100vh;
    background: #ffffff;
  }

  /* ══ LEFT: SLIDESHOW 20% ══ */
  #panel-left {
    width: 20%; height: 100%;
    position: relative;
    overflow: hidden;
    flex-shrink: 0;
    background: #f5f5f5;
    border-right: 1px solid var(--border);
  }

  .slide {
    position: absolute; inset: 0;
    opacity: 0;
    transition: opacity 1.4s cubic-bezier(0.4,0,0.2,1);
  }
  .slide.active { opacity: 1; }

  .slide img, .slide video {
    width: 100%; height: 100%;
    object-fit: cover; display: block;
  }

  #panel-left::after {
    content: '';
    position: absolute; left: 0; right: 0; bottom: 0;
    height: 72px;
    background: linear-gradient(transparent, rgba(0,0,0,0.2));
    pointer-events: none; z-index: 5;
  }

  #slide-dots {
    position: absolute; bottom: 14px;
    left: 50%; transform: translateX(-50%);
    display: flex; gap: 5px; z-index: 10;
  }

  .dot {
    width: 5px; height: 5px; border-radius: 50%;
    background: rgba(255,255,255,0.45);
    transition: all 0.35s ease;
  }
  .dot.active {
    background: #fff; width: 18px; border-radius: 3px;
  }

  .slide-placeholder {
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 12px;
    background: var(--surface2); color: var(--text3);
  }
  .slide-placeholder span {
    font-size: 11px; letter-spacing: 1.5px;
    text-transform: uppercase;
  }

  /* ══ MID: MENU 60% — full height, no topbar ══ */
  #panel-mid {
    width: 60%; height: 100%;
    position: relative; background: #ffffff;
    overflow: hidden; flex-shrink: 0;
    border-right: 1px solid var(--border);
  }

  #menu-pages {
    position: absolute; inset: 0;
  }

  .menu-page {
    position: absolute; inset: 0;
    opacity: 0; transition: opacity 0.9s ease;
  }
  .menu-page.active { opacity: 1; }

  .menu-page img {
    width: 100%; height: 100%;
    object-fit: contain; object-position: top center; display: block;
  }

  .menu-placeholder {
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 14px; color: var(--text3);
  }
  .menu-placeholder p {
    font-size: 13px; letter-spacing: 1px;
    text-transform: uppercase; opacity: 0.5;
  }

  /* ══ RIGHT: CART / SESSION DISPLAY 20% ══ */
  #panel-right {
    width: 20%; height: 100%;
    background: #ffffff;
    display: flex; flex-direction: column;
    flex-shrink: 0; overflow: hidden;
  }

  #orders-header {
    flex-shrink: 0;
    padding: 18px 16px 14px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }

  .orders-title {
    font-size: 11px; font-weight: 500;
    letter-spacing: 2px; text-transform: uppercase; color: var(--text3);
  }

  .orders-badge {
    background: var(--accent); color: #fff;
    font-size: 11px; font-weight: 700;
    padding: 2px 10px; border-radius: 20px;
    min-width: 26px; text-align: center;
  }

  #orders-list {
    flex: 1; overflow: hidden;
    padding: 10px 10px 0; display: flex;
    flex-direction: column; gap: 8px;
  }

  /* ORDER / CART CARD */
  .order-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 13px 13px 11px;
    position: relative; overflow: hidden;
    animation: cardIn 0.45s cubic-bezier(0.16,1,0.3,1);
    transition: opacity 0.4s ease, transform 0.4s ease, max-height 0.4s ease, padding 0.4s ease;
    max-height: 300px;
  }

  .order-card::before {
    content: ''; position: absolute;
    left: 0; top: 0; bottom: 0; width: 3px;
    background: var(--border2); border-radius: 0;
  }
  .order-card.status-cash_payment::before { background: var(--amber); }
  .order-card.status-ready::before        { background: var(--green); }
  .order-card.status-cancelled::before    { background: var(--red); }

  .order-card.removing {
    opacity: 0; transform: translateX(10px);
    max-height: 0 !important; padding: 0 13px; margin: 0;
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(-8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card-top {
    display: flex; align-items: flex-start;
    justify-content: space-between; margin-bottom: 7px; gap: 6px;
  }

  .card-session-id {
    font-family: 'Google Sans Display', 'Google Sans', sans-serif;
    font-size: 13px; font-weight: 700;
    color: var(--text2); line-height: 1; letter-spacing: 0;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    max-width: 70%;
  }

  .card-status-pill {
    font-size: 10px; font-weight: 500;
    padding: 3px 8px; border-radius: 20px;
    white-space: nowrap; flex-shrink: 0;
    background: var(--surface2); color: var(--text3);
  }
  .status-cash_payment .card-status-pill { background: var(--amber-bg); color: var(--amber); }
  .status-ready        .card-status-pill { background: var(--green-bg); color: var(--green); }
  .status-cancelled    .card-status-pill { background: var(--red-bg);   color: var(--red); }

  .card-items { list-style: none; margin-bottom: 8px; }

  .card-item {
    font-size: 12px; color: var(--text2);
    padding: 2px 0; display: flex; align-items: center; gap: 6px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .card-item::before {
    content: ''; width: 3px; height: 3px;
    border-radius: 50%; background: var(--text3); flex-shrink: 0;
  }

  .card-item-price {
    margin-left: auto; font-size: 11px;
    color: var(--text3); flex-shrink: 0;
  }

  .card-footer {
    display: flex; align-items: center; justify-content: space-between;
    border-top: 1px solid var(--border); padding-top: 8px; margin-top: 4px;
  }

  .card-time  { font-size: 11px; color: var(--text3); }
  .card-price {
    font-family: 'Google Sans', sans-serif;
    font-size: 14px; font-weight: 700; color: var(--accent);
  }

  /* ── TOTAL BILL BLOCK ── */
  #bill-total-block {
    flex-shrink: 0;
    padding: 16px 16px 14px;
    border-top: 2px solid var(--border);
    background: #ffffff;
  }

  .bill-label {
    font-size: 10px; font-weight: 500;
    letter-spacing: 2px; text-transform: uppercase;
    color: var(--text3); margin-bottom: 6px;
  }

  .bill-row {
    display: flex; align-items: baseline; justify-content: space-between;
    gap: 8px;
  }

  .bill-amount {
    font-family: 'Google Sans Display', 'Google Sans', sans-serif;
    font-size: 36px; font-weight: 700;
    color: var(--accent); letter-spacing: -1px; line-height: 1;
  }

  .bill-change-row {
    display: flex; justify-content: space-between; align-items: center;
    margin-top: 8px; padding-top: 8px;
    border-top: 1px dashed var(--border2);
  }

  .bill-change-label {
    font-size: 11px; color: var(--text3);
  }

  .bill-change-val {
    font-family: 'Google Sans', sans-serif;
    font-size: 16px; font-weight: 700; color: var(--green);
  }

  .bill-empty {
    font-size: 11px; color: var(--text3);
    text-align: center; padding: 10px 0;
    letter-spacing: 1px; text-transform: uppercase;
    opacity: 0.5;
  }

  /* ── ORDERS EMPTY ── */
  .orders-empty {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 10px; color: var(--text3);
    padding: 20px; text-align: center;
    flex: 1;
  }
  .orders-empty svg { opacity: 0.2; }
  .orders-empty p {
    font-size: 11px; letter-spacing: 1px;
    text-transform: uppercase; opacity: 0.4; line-height: 1.9;
  }

  #conn-status {
    flex-shrink: 0; padding: 7px 14px;
    border-top: 1px solid var(--border);
    display: flex; align-items: center; gap: 6px;
    font-size: 10px; letter-spacing: 1px;
    text-transform: uppercase; color: var(--text3);
    background: #ffffff;
  }

  .conn-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--border2); flex-shrink: 0;
  }
  .conn-dot.online  { background: var(--green); }
  .conn-dot.offline { background: var(--red); }
</style>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>
<body>
<div id="app">

  <!-- LEFT: SLIDESHOW -->
  <div id="panel-left">
    <div id="slide-container">
      <div class="slide-placeholder" id="slide-placeholder">
        <svg width="38" height="38" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="2" y="5" width="20" height="14" rx="2"/>
          <path d="m10 9 6 3-6 3V9z"/>
        </svg>
        <span>Chưa có nội dung</span>
      </div>
    </div>
    <div id="slide-dots"></div>
  </div>

  <!-- MID: MENU ONLY (no topbar) -->
  <div id="panel-mid">
    <div id="menu-pages">
      <div class="menu-page active" id="menu-placeholder-page">
        <div class="menu-placeholder">
          <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
            <path d="M4 6h16M4 12h16M4 18h10"/>
          </svg>
          <p>Menu chưa được cấu hình</p>
        </div>
      </div>
    </div>
  </div>

  <!-- RIGHT: SESSION / CART -->
  <div id="panel-right">
    <div id="orders-header">
      <div class="orders-title">Giỏ hàng</div>
      <div class="orders-badge" id="orders-count">0</div>
    </div>

    <div id="orders-list">
      <div class="orders-empty" id="orders-empty">
        <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4">
          <circle cx="12" cy="12" r="9"/>
          <path d="M12 8v4l3 3"/>
        </svg>
        <p>Chưa có<br>giỏ hàng</p>
      </div>
    </div>

    <!-- TOTAL BILL -->
    <div id="bill-total-block">
      <div class="bill-label">Tổng thanh toán</div>
      <div id="bill-empty" class="bill-empty">—</div>
      <div id="bill-content" style="display:none">
        <div class="bill-row">
          <div class="bill-amount" id="bill-amount">0đ</div>
        </div>
        <div class="bill-change-row" id="bill-change-row" style="display:none">
          <span class="bill-change-label">Tiền thối</span>
          <span class="bill-change-val" id="bill-change-val">0đ</span>
        </div>
      </div>
    </div>

    <div id="conn-status">
      <div class="conn-dot" id="conn-dot"></div>
      <span id="conn-text">Đang kết nối...</span>
    </div>
  </div>

</div>
<script>
/* ── FIREBASE CONFIG ── */
var firebaseConfig = {
  apiKey:        "AIzaSyCNh1-16gYZ0P30Fkd-2tB-O89PXkPX9Lc",
  authDomain:    "the-cafe-33.firebaseapp.com",
  databaseURL:   "https://the-cafe-33-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:     "the-cafe-33",
  storageBucket: "the-cafe-33.firebasestorage.app",
  messagingSenderId: "...",
  appId:         "..."
};
if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
var db = firebase.database();

/* ── SLIDESHOW ── */
var slides = [], cur = 0, slideTimer = null;

function buildSlides(items, dur) {
  var c = document.getElementById('slide-container');
  var d = document.getElementById('slide-dots');
  c.innerHTML = ''; d.innerHTML = ''; slides = []; cur = 0;
  if (slideTimer) clearTimeout(slideTimer);

  if (!items || !items.length) {
    c.innerHTML = '<div class="slide-placeholder"><svg width="38" height="38" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="m10 9 6 3-6 3V9z"/></svg><span>Không có nội dung</span></div>';
    return;
  }

  items.forEach(function(item, i) {
    var s = document.createElement('div');
    s.className = 'slide' + (i === 0 ? ' active' : '');
    if (item.type === 'video') {
      var v = document.createElement('video');
      v.src = item.url; v.muted = true; v.playsInline = true; v.loop = false; v.preload = 'auto';
      s.appendChild(v);
    } else {
      var img = document.createElement('img');
      img.src = item.url; img.loading = 'lazy';
      s.appendChild(img);
    }
    c.appendChild(s); slides.push(s);
    var dot = document.createElement('div');
    dot.className = 'dot' + (i === 0 ? ' active' : '');
    d.appendChild(dot);
  });

  function go(idx) {
    var dots = d.querySelectorAll('.dot');
    slides[cur].classList.remove('active'); dots[cur].classList.remove('active');
    var pv = slides[cur].querySelector('video');
    if (pv) { pv.pause(); pv.currentTime = 0; }
    cur = (idx + slides.length) % slides.length;
    slides[cur].classList.add('active'); dots[cur].classList.add('active');
    var v = slides[cur].querySelector('video');
    if (v) { v.play().catch(function(){}); v.onended = function() { go(cur + 1); }; }
    else { if (slideTimer) clearTimeout(slideTimer); slideTimer = setTimeout(function() { go(cur + 1); }, dur); }
  }

  var fv = slides[0].querySelector('video');
  if (fv) { fv.play().catch(function(){}); fv.onended = function() { go(1); }; }
  else slideTimer = setTimeout(function() { go(1); }, dur);
}

/* ── MENU ── */
var menuTimer = null;

function buildMenu(pages) {
  var el = document.getElementById('menu-pages');
  el.innerHTML = '';
  if (menuTimer) clearInterval(menuTimer);
  if (!pages || !pages.length) {
    el.innerHTML = '<div class="menu-page active"><div class="menu-placeholder"><svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M4 6h16M4 12h16M4 18h10"/></svg><p>Menu chưa cấu hình</p></div></div>';
    return;
  }
  pages.forEach(function(p, i) {
    var d = document.createElement('div');
    d.className = 'menu-page' + (i === 0 ? ' active' : '');
    var img = document.createElement('img'); img.src = p.url;
    d.appendChild(img); el.appendChild(d);
  });
  if (pages.length > 1) {
    var idx = 0;
    menuTimer = setInterval(function() {
      var ps = el.querySelectorAll('.menu-page');
      ps[idx].classList.remove('active');
      idx = (idx + 1) % pages.length;
      ps[idx].classList.add('active');
    }, 15000);
  }
}

/* ── HELPERS ── */
function fmtP(p) {
  return p != null ? new Intl.NumberFormat('vi-VN').format(p) + 'đ' : '';
}

/* ── SESSION DISPLAY (giỏ hàng từ node session_display_*) ── */
var sessionCards = {}; // sessionId -> { el, data }

function updateBillDisplay() {
  var keys = Object.keys(sessionCards);
  var billEmpty  = document.getElementById('bill-empty');
  var billContent = document.getElementById('bill-content');
  var billAmount  = document.getElementById('bill-amount');
  var billChangeRow = document.getElementById('bill-change-row');
  var billChangeVal = document.getElementById('bill-change-val');

  if (!keys.length) {
    billEmpty.style.display = '';
    billContent.style.display = 'none';
    document.getElementById('orders-count').textContent = '0';
    return;
  }

  // Lấy session mới nhất (updatedAt lớn nhất)
  var latest = null;
  keys.forEach(function(k) {
    var d = sessionCards[k];
    if (!latest || (d.updatedAt || 0) > (sessionCards[latest].updatedAt || 0)) latest = k;
  });

  var data = sessionCards[latest];
  var total = data.total || 0;
  var paid  = data.paid  || 0;
  var change = data.change != null ? data.change : (paid - total);

  billEmpty.style.display = 'none';
  billContent.style.display = '';
  billAmount.textContent = fmtP(total);

  if (paid > 0 && change >= 0) {
    billChangeRow.style.display = '';
    billChangeVal.textContent = fmtP(change);
  } else {
    billChangeRow.style.display = 'none';
  }

  document.getElementById('orders-count').textContent = keys.length;
}

function renderSession(sessionId, data) {
  var list  = document.getElementById('orders-list');
  var empty = document.getElementById('orders-empty');
  if (empty) empty.style.display = 'none';

  // Lưu data để tính bill
  sessionCards[sessionId] = data;
  sessionCards[sessionId].updatedAt = data.updatedAt || 0;

  var el = document.getElementById('sc-' + sessionId);
  if (!el) {
    el = document.createElement('div');
    el.id = 'sc-' + sessionId;
    list.prepend(el);
  }

  var st = (data.state || 'pending').toLowerCase();
  el.className = 'order-card status-' + st;

  // Cart items — Firebase có thể là array hoặc object
  var cartItems = [];
  if (Array.isArray(data.cart)) {
    cartItems = data.cart;
  } else if (data.cart && typeof data.cart === 'object') {
    cartItems = Object.values(data.cart);
  }

  // Label trạng thái
  var STATE_LABELS = {
    cash_payment: 'Tiền mặt',
    pending:      'Chờ',
    ready:        'Sẵn sàng',
    cancelled:    'Đã hủy',
    done:         'Hoàn thành'
  };

  // Tên hiển thị ngắn từ sessionId
  var shortId = sessionId.replace('session_display_', '').slice(0, 12);

  el.innerHTML =
    '<div class="card-top">' +
      '<div class="card-session-id">' + shortId + '</div>' +
      '<div class="card-status-pill">' + (STATE_LABELS[st] || st) + '</div>' +
    '</div>' +
    '<ul class="card-items">' +
      cartItems.map(function(it) {
        var name = it.name || '?';
        var qty  = it.qty  || it.quantity || 1;
        var size = it.size ? ' (' + it.size + ')' : '';
        var price = it.price ? fmtP(it.price * qty) : '';
        return '<li class="card-item">' +
          '<span style="flex:1;overflow:hidden;text-overflow:ellipsis">' + qty + '× ' + name + size + '</span>' +
          (price ? '<span class="card-item-price">' + price + '</span>' : '') +
        '</li>';
      }).join('') +
    '</ul>';

  updateBillDisplay();
}

function removeSession(sessionId) {
  var el = document.getElementById('sc-' + sessionId);
  if (el) {
    el.classList.add('removing');
    setTimeout(function() {
      el.remove();
      delete sessionCards[sessionId];
      updateBillDisplay();
      if (Object.keys(sessionCards).length === 0) {
        var em = document.getElementById('orders-empty');
        if (em) em.style.display = '';
      }
    }, 450);
  } else {
    delete sessionCards[sessionId];
    updateBillDisplay();
  }
}

/* ── FIREBASE LISTENERS ── */
function setConn(ok) {
  document.getElementById('conn-dot').className   = 'conn-dot ' + (ok ? 'online' : 'offline');
  document.getElementById('conn-text').textContent = ok ? 'Đã kết nối' : 'Mất kết nối';
}

db.ref('.info/connected').on('value', function(snap) { setConn(snap.val()); });

// Lắng nghe tất cả node bắt đầu bằng session_display_
// Firebase không hỗ trợ prefix query trực tiếp trên key,
// nên ta lắng nghe root và lọc phía client.
db.ref('/').on('value', function(snap) {
  var root = snap.val();
  if (!root) return;

  Object.keys(root).forEach(function(key) {
    if (key.startsWith('session_display_')) {
      var data = root[key];
      if (data && typeof data === 'object') {
        renderSession(key, data);
      }
    }
  });

  // Xóa card nếu node biến mất
  Object.keys(sessionCards).forEach(function(k) {
    if (!root[k]) removeSession(k);
  });
});

// Slides & menu từ Firebase
db.ref('kiosk_config').on('value', function(snap) {
  var kc = snap.val();
  if (!kc) {
    try { kc = JSON.parse(localStorage.getItem('kiosk_config') || 'null'); } catch(e) {}
  }
  if (!kc) return;
  if (kc.slides && kc.slides.length)
    buildSlides(kc.slides, (kc.slideDuration || 6) * 1000);
  if (kc.menuPages && kc.menuPages.length)
    buildMenu(kc.menuPages);
});
</script>
</body>
</html>
