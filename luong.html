<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lương — Xolifa</title>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-database-compat.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
:root {
  --green: #1a4a2e;
  --green-mid: #2d7a4f;
  --accent: #34c759;
  --bg: #f5f5f7;
  --card: #ffffff;
  --card2: #f5f5f7;
  --border: rgba(0,0,0,0.08);
  --text: #1d1d1f;
  --text2: #6e6e73;
  --text3: #aeaeb2;
  --amber: #ff9f0a;
  --purple: #bf5af2;
  --blue: #0071e3;
  --red: #ff3b30;
  --r-sm: 12px;
  --r-md: 18px;
  --r-lg: 22px;
  --r-xl: 28px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-font-smoothing:antialiased;}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;background:var(--bg);min-height:100vh;color:var(--text);}

/* ── LOGIN ── */
#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:var(--bg);}
.login-wrap{width:100%;max-width:360px;}
.login-logo{width:64px;height:64px;background:var(--green);border-radius:18px;display:flex;align-items:center;justify-content:center;margin:0 auto 28px;font-size:28px;}
.login-title{font-size:28px;font-weight:600;text-align:center;letter-spacing:-0.5px;margin-bottom:6px;}
.login-sub{font-size:14px;color:var(--text2);text-align:center;margin-bottom:36px;}
.field{margin-bottom:14px;}
.field input{
  width:100%;padding:14px 16px;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--r-md);
  font-family:inherit;font-size:15px;color:var(--text);
  outline:none;transition:border-color .2s;
}
.field input:focus{border-color:rgba(0,0,0,0.25);}
.field input::placeholder{color:var(--text3);}
.btn-login{
  width:100%;padding:15px;margin-top:6px;
  background:var(--green);color:#fff;border:none;
  border-radius:var(--r-md);
  font-family:inherit;font-size:15px;font-weight:600;
  cursor:pointer;transition:opacity .15s;
  letter-spacing:-0.1px;
}
.btn-login:hover{opacity:.88;}
.btn-login:disabled{opacity:.4;cursor:not-allowed;}
.login-err{
  margin-top:12px;padding:12px 14px;
  background:#fff0f0;border:1px solid rgba(255,59,48,.2);
  border-radius:var(--r-sm);
  font-size:13px;color:var(--red);text-align:center;
  display:none;
}

/* ── DASHBOARD ── */
#dashboard-screen{display:none;min-height:100vh;}
.topbar{
  height:52px;padding:0 20px;
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(255,255,255,.8);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:100;
}
.tb-left{display:flex;align-items:center;gap:10px;}
.tb-logo{width:30px;height:30px;background:var(--green);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;}
.tb-title{font-size:15px;font-weight:600;color:var(--text);letter-spacing:-0.2px;}
.tb-right{display:flex;align-items:center;gap:10px;}
.user-pill{
  display:flex;align-items:center;gap:8px;
  background:var(--card2);border-radius:100px;
  padding:5px 12px 5px 5px;
}
.user-av{
  width:24px;height:24px;border-radius:50%;
  background:var(--green);color:#fff;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:600;
}
.user-name{font-size:13px;font-weight:500;color:var(--text);}
.btn-out{
  padding:6px 14px;background:transparent;
  border:1px solid var(--border);border-radius:100px;
  font-family:inherit;font-size:12px;font-weight:500;
  color:var(--text2);cursor:pointer;transition:all .15s;
}
.btn-out:hover{border-color:rgba(0,0,0,.2);color:var(--text);}

.body{max-width:680px;margin:0 auto;padding:28px 20px 80px;}

/* ── PERIOD CONTROL ── */
.period-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px;}
.period-title{font-size:22px;font-weight:600;letter-spacing:-0.5px;}
.period-sub{font-size:13px;color:var(--text2);margin-top:2px;}
.controls-row{display:flex;align-items:center;gap:8px;}
.seg{display:flex;background:var(--card2);border-radius:100px;padding:3px;gap:2px;}
.seg-btn{
  padding:6px 16px;border-radius:100px;border:none;
  font-family:inherit;font-size:13px;font-weight:500;
  cursor:pointer;background:transparent;color:var(--text2);
  transition:all .18s;
}
.seg-btn.active{background:var(--card);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.1);}
.nav-row{display:flex;align-items:center;gap:6px;background:var(--card);border:1px solid var(--border);border-radius:100px;padding:4px 6px;}
.nav-btn{
  width:28px;height:28px;border-radius:50%;border:none;
  background:transparent;cursor:pointer;color:var(--text2);
  font-size:15px;display:flex;align-items:center;justify-content:center;
  transition:background .15s;
}
.nav-btn:hover{background:var(--card2);}
.nav-label{font-size:13px;font-weight:500;min-width:96px;text-align:center;}

/* ── CARDS ── */
.card{background:var(--card);border-radius:var(--r-xl);border:1px solid var(--border);overflow:hidden;margin-bottom:12px;}
.card-section{padding:20px 22px;}
.card-section+.card-section{border-top:1px solid var(--border);}

/* ── HERO TOTAL ── */
.hero{padding:28px 24px 24px;text-align:center;}
.hero-label{font-size:12px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;color:var(--text2);margin-bottom:10px;}
.hero-amount{font-size:48px;font-weight:300;letter-spacing:-2px;color:var(--text);line-height:1;}
.hero-amount span{font-size:24px;font-weight:400;vertical-align:super;letter-spacing:0;margin-right:2px;}
.hero-sub{font-size:13px;color:var(--text2);margin-top:8px;}

/* ── STAT GRID ── */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border);}
.stat-cell{background:var(--card);padding:18px 20px;}
.stat-label{font-size:11px;font-weight:500;letter-spacing:.05em;text-transform:uppercase;color:var(--text2);margin-bottom:6px;}
.stat-value{font-size:20px;font-weight:500;letter-spacing:-0.5px;color:var(--text);}
.stat-value.accent-green{color:var(--green-mid);}
.stat-value.accent-amber{color:var(--amber);}
.stat-value.accent-purple{color:var(--purple);}
.stat-sub{font-size:12px;color:var(--text3);margin-top:3px;}

/* ── KPI BAR ── */
.kpi-wrap{padding:20px 22px;}
.kpi-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px;}
.kpi-title{font-size:13px;font-weight:500;color:var(--text);}
.kpi-pct{font-size:13px;font-weight:600;color:var(--green-mid);}
.kpi-track{height:6px;background:var(--card2);border-radius:100px;overflow:hidden;}
.kpi-fill{height:100%;border-radius:100px;background:var(--green);transition:width .8s cubic-bezier(.16,1,.3,1);}
.kpi-nums{display:flex;justify-content:space-between;margin-top:7px;font-size:12px;color:var(--text3);}

/* ── BREAKDOWN ROWS ── */
.bk-row{display:flex;align-items:center;justify-content:space-between;padding:14px 22px;border-top:1px solid var(--border);}
.bk-row:first-child{border-top:none;}
.bk-left{display:flex;align-items:center;gap:11px;}
.bk-icon{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
.bk-name{font-size:14px;font-weight:500;}
.bk-desc{font-size:12px;color:var(--text2);margin-top:1px;}
.bk-amount{font-size:15px;font-weight:600;letter-spacing:-0.3px;}

/* ── YEAR TABLE ── */
.yt-wrap{overflow-x:auto;}
table.yt{width:100%;border-collapse:collapse;font-size:13px;}
table.yt th{padding:11px 16px;text-align:right;font-size:11px;font-weight:500;letter-spacing:.05em;text-transform:uppercase;color:var(--text2);background:#fafafa;border-bottom:1px solid var(--border);}
table.yt th:first-child{text-align:left;}
table.yt td{padding:13px 16px;border-bottom:1px solid var(--border);text-align:right;font-weight:500;color:var(--text);}
table.yt td:first-child{text-align:left;color:var(--text2);}
table.yt tr:last-child td{border-bottom:none;}
table.yt tr:hover td{background:var(--card2);}
.tag-ship{background:#f3e8ff;color:#7c3aed;border-radius:5px;padding:2px 7px;font-size:11px;font-weight:600;margin-right:4px;}

/* ── LOADING ── */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:14px;color:var(--text2);font-size:14px;}
.spin{width:26px;height:26px;border:2.5px solid rgba(0,0,0,.08);border-top-color:var(--green);border-radius:50%;animation:spin .65s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
.fade-up{animation:fadeUp .35s cubic-bezier(.16,1,.3,1) both;}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-wrap">
    <div class="login-logo">🌿</div>
    <div class="login-title">Bảng lương</div>
    <div class="login-sub">Đăng nhập để xem thông tin lương</div>
    <div class="field"><input type="text" id="inp-user" placeholder="Tên đăng nhập" autocomplete="username"></div>
    <div class="field"><input type="password" id="inp-pass" placeholder="Mật khẩu" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <button class="btn-login" id="btn-login" onclick="doLogin()">Đăng nhập</button>
    <div class="login-err" id="login-error">Tài khoản hoặc mật khẩu không đúng.</div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard-screen">
  <div class="topbar">
    <div class="tb-left">
      <div class="tb-logo">🌿</div>
      <div class="tb-title">Xolifa · Lương</div>
    </div>
    <div class="tb-right">
      <div class="user-pill">
        <div class="user-av" id="user-av">?</div>
        <div class="user-name" id="user-name">--</div>
      </div>
      <button class="btn-out" onclick="doLogout()">Đăng xuất</button>
    </div>
  </div>

  <div class="body">
    <div class="period-row">
      <div>
        <div class="period-title" id="period-title">Tháng này</div>
        <div class="period-sub" id="period-sub">--</div>
      </div>
      <div class="controls-row">
        <div class="seg">
          <button class="seg-btn active" id="tab-month" onclick="switchTab('month')">Tháng</button>
          <button class="seg-btn" id="tab-year" onclick="switchTab('year')">Năm</button>
        </div>
        <div class="nav-row" id="nav-row">
          <button class="nav-btn" onclick="changeMonth(-1)">‹</button>
          <div class="nav-label" id="nav-label">--</div>
          <button class="nav-btn" onclick="changeMonth(1)">›</button>
        </div>
      </div>
    </div>

    <div id="content-area">
      <div class="loading"><div class="spin"></div>Đang tải...</div>
    </div>
  </div>
</div>

<script>
const firebaseConfig = {
  apiKey:      "AIzaSyCNh1-16gYZ0P30Fkd-2tB-O89PXkPX9Lc",
  authDomain:  "the-cafe-33.firebaseapp.com",
  databaseURL: "https://the-cafe-33-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:   "the-cafe-33",
};
if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
const fstore = firebase.firestore();
const rtdb   = firebase.database();

let currentUser = null;
let currentTab  = 'month';
let viewYear    = new Date().getFullYear();
let viewMonth   = new Date().getMonth() + 1;

const MONTH_KEYS  = ['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'];
const MONTH_NAMES = ['Tháng 1','Tháng 2','Tháng 3','Tháng 4','Tháng 5','Tháng 6','Tháng 7','Tháng 8','Tháng 9','Tháng 10','Tháng 11','Tháng 12'];

const fmt    = n => Number(Math.round(n)).toLocaleString('vi-VN') + 'đ';
const fmtNum = n => Number(Math.round(n)).toLocaleString('vi-VN');

function saveSession(u) { sessionStorage.setItem('xl_user', JSON.stringify(u)); }
function loadSession()  { const r = sessionStorage.getItem('xl_user'); return r ? JSON.parse(r) : null; }
function clearSession() { sessionStorage.removeItem('xl_user'); }

async function doLogin() {
  const user  = document.getElementById('inp-user').value.trim();
  const pass  = document.getElementById('inp-pass').value;
  const errEl = document.getElementById('login-error');
  const btn   = document.getElementById('btn-login');
  errEl.style.display = 'none';
  if (!user || !pass) { errEl.textContent = 'Vui lòng nhập đầy đủ.'; errEl.style.display = 'block'; return; }
  btn.disabled = true; btn.textContent = 'Đang đăng nhập...';
  try {
    const doc = await fstore.collection('xolifa_luong').doc('accounts').get();
    if (!doc.exists) throw new Error('no_accounts');
    const accounts = doc.data().list || [];
    const match = accounts.find(a => a.username === user && a.password === pass);
    if (!match) throw new Error('wrong');
    currentUser = match;
    saveSession(match);
    showDashboard();
  } catch(e) {
    errEl.textContent = (e.message === 'wrong' || e.message === 'no_accounts')
      ? 'Tài khoản hoặc mật khẩu không đúng.' : 'Lỗi kết nối. Thử lại sau.';
    errEl.style.display = 'block';
  }
  btn.disabled = false; btn.textContent = 'Đăng nhập';
}

function doLogout() {
  clearSession(); currentUser = null;
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('dashboard-screen').style.display = 'none';
  document.getElementById('inp-user').value = '';
  document.getElementById('inp-pass').value = '';
}

function showDashboard() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('dashboard-screen').style.display = 'block';
  const init = (currentUser.hoTen || currentUser.username).charAt(0).toUpperCase();
  document.getElementById('user-av').textContent   = init;
  document.getElementById('user-name').textContent = currentUser.hoTen || currentUser.username;
  updateNavLabel();
  loadAndRender();
}

function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tab-month').classList.toggle('active', tab === 'month');
  document.getElementById('tab-year').classList.toggle('active', tab === 'year');
  document.getElementById('nav-row').style.display = tab === 'month' ? 'flex' : 'none';
  updateNavLabel();
  loadAndRender();
}

function changeMonth(dir) {
  viewMonth += dir;
  if (viewMonth > 12) { viewMonth = 1; viewYear++; }
  if (viewMonth < 1)  { viewMonth = 12; viewYear--; }
  updateNavLabel();
  loadAndRender();
}

function updateNavLabel() {
  document.getElementById('nav-label').textContent =
    currentTab === 'month' ? `${MONTH_NAMES[viewMonth-1]} ${viewYear}` : String(viewYear);
  document.getElementById('period-title').textContent =
    currentTab === 'month' ? MONTH_NAMES[viewMonth-1] : `Năm ${viewYear}`;
  document.getElementById('period-sub').textContent =
    currentTab === 'month' ? `${viewYear}` : 'Tổng hợp 12 tháng';
}

async function loadAndRender() {
  document.getElementById('content-area').innerHTML =
    '<div class="loading"><div class="spin"></div>Đang tải dữ liệu...</div>';
  try {
    const cfgDoc = await fstore.collection('xolifa_luong').doc('config').get();
    const cfg = cfgDoc.exists ? cfgDoc.data() : {};
    if (currentTab === 'month') await renderMonth(cfg, viewYear, viewMonth);
    else await renderYear(cfg, viewYear);
  } catch(e) {
    document.getElementById('content-area').innerHTML =
      `<div class="loading" style="color:var(--red)">Lỗi: ${e.message}</div>`;
  }
}

async function fetchMonthData(year, month) {
  const monthKey = MONTH_KEYS[month - 1];
  const now = new Date();
  const isCurrentMonth = (year === now.getFullYear() && month === now.getMonth() + 1);
  let revenue = 0, shipCount = 0;
  const daysInMonth = new Date(year, month, 0).getDate();
  for (let d = 1; d <= daysInMonth; d++) {
    const dateObj = new Date(year, month - 1, d);
    if (isCurrentMonth && dateObj > now) break;
    const dayStr = String(d).padStart(2, '0');
    try {
      const rtSnap = await rtdb.ref(`orders_xolifa/${monthKey}/${dayStr}`).once('value');
      const rtData = rtSnap.val() || {};
      let fsData = {};
      try {
        const fsDoc = await fstore.collection('orders_xolifa_archive').doc(`${monthKey}_${dayStr}_${year}`).get();
        fsData = fsDoc.exists ? (fsDoc.data().orders || {}) : {};
      } catch(_) {}
      const orders = { ...fsData, ...rtData };
      Object.values(orders).forEach(o => {
        revenue += (o.total || 0) - (o.foodTotal || 0);
        if (o.isShip === true) shipCount++;
      });
    } catch(_) {}
  }
  return { revenue, shipCount };
}

async function renderMonth(cfg, year, month) {
  const monthKey   = `${year}-${String(month).padStart(2,'0')}`;
  const monthCfg   = (cfg.months || {})[monthKey] || {};
  const kpiTarget  = monthCfg.kpiTarget  || 0;
  const bonusPct   = monthCfg.bonusPct   || 0;
  const thuongShip = currentUser.thuongShip || 0;
  const luongCung  = currentUser.luongCung  || 0;

  const { revenue, shipCount } = await fetchMonthData(year, month);
  const phanDu     = Math.max(0, revenue - kpiTarget);
  const thuongKpi  = phanDu * (bonusPct / 100);
  const thuongShipTotal = shipCount * thuongShip;
  const tongDuTinh = luongCung + thuongKpi + thuongShipTotal;
  const kpiPct     = kpiTarget > 0 ? Math.min(100, (revenue / kpiTarget) * 100) : 0;

  document.getElementById('content-area').innerHTML = `
    <div class="fade-up">

      <!-- Hero total -->
      <div class="card" style="margin-bottom:12px">
        <div class="hero">
          <div class="hero-label">Tổng dự tính nhận</div>
          <div class="hero-amount"><span>₫</span>${fmtNum(tongDuTinh)}</div>
          <div class="hero-sub">Lương cứng + Thưởng KPI + Thưởng ship</div>
        </div>

        <!-- KPI bar -->
        <div class="kpi-wrap" style="border-top:1px solid var(--border)">
          <div class="kpi-header">
            <div class="kpi-title">KPI Doanh thu</div>
            <div class="kpi-pct">${kpiPct.toFixed(1)}%</div>
          </div>
          <div class="kpi-track"><div class="kpi-fill" id="kpi-fill" style="width:0%"></div></div>
          <div class="kpi-nums">
            <span>${fmtNum(revenue)}đ</span>
            <span>${kpiTarget > 0 ? fmtNum(kpiTarget) + 'đ' : 'Chưa cấu hình'}</span>
          </div>
        </div>
      </div>

      <!-- Stat grid -->
      <div class="card" style="margin-bottom:12px">
        <div class="stat-grid">
          <div class="stat-cell">
            <div class="stat-label">Lương cứng</div>
            <div class="stat-value accent-green">${fmt(luongCung)}</div>
            <div class="stat-sub">Cố định hàng tháng</div>
          </div>
          <div class="stat-cell">
            <div class="stat-label">Doanh thu thực</div>
            <div class="stat-value">${fmt(revenue)}</div>
            <div class="stat-sub">Tháng ${month}/${year}</div>
          </div>
          <div class="stat-cell">
            <div class="stat-label">Thưởng KPI</div>
            <div class="stat-value accent-amber">${fmt(thuongKpi)}</div>
            <div class="stat-sub">${phanDu > 0 ? `Vượt ${fmtNum(phanDu)}đ × ${bonusPct}%` : kpiTarget > 0 ? 'Chưa đạt KPI' : 'Chưa cấu hình'}</div>
          </div>
          <div class="stat-cell">
            <div class="stat-label">Thưởng ship</div>
            <div class="stat-value accent-purple">${fmt(thuongShipTotal)}</div>
            <div class="stat-sub">${shipCount} đơn × ${fmt(thuongShip)}</div>
          </div>
        </div>
      </div>

      <!-- Breakdown -->
      <div class="card">
        <div class="bk-row">
          <div class="bk-left">
            <div class="bk-icon" style="background:#e8f5ee">💵</div>
            <div>
              <div class="bk-name">Lương cứng</div>
              <div class="bk-desc">Cố định hàng tháng</div>
            </div>
          </div>
          <div class="bk-amount" style="color:var(--green-mid)">${fmt(luongCung)}</div>
        </div>
        <div class="bk-row">
          <div class="bk-left">
            <div class="bk-icon" style="background:#fff8e7">🏆</div>
            <div>
              <div class="bk-name">Thưởng KPI</div>
              <div class="bk-desc">Phần dư × ${bonusPct}%</div>
            </div>
          </div>
          <div class="bk-amount" style="color:var(--amber)">${fmt(thuongKpi)}</div>
        </div>
        <div class="bk-row">
          <div class="bk-left">
            <div class="bk-icon" style="background:#f3e8ff">🚚</div>
            <div>
              <div class="bk-name">Thưởng ship</div>
              <div class="bk-desc">${shipCount} đơn × ${fmt(thuongShip)}</div>
            </div>
          </div>
          <div class="bk-amount" style="color:var(--purple)">${fmt(thuongShipTotal)}</div>
        </div>
        <div class="bk-row" style="background:var(--card2)">
          <div class="bk-left">
            <div class="bk-icon" style="background:var(--green)">✨</div>
            <div>
              <div class="bk-name" style="font-weight:600">Tổng nhận</div>
              <div class="bk-desc">Dự tính tháng này</div>
            </div>
          </div>
          <div class="bk-amount" style="color:var(--green);font-size:17px">${fmt(tongDuTinh)}</div>
        </div>
      </div>
    </div>
  `;
  setTimeout(() => {
    const el = document.getElementById('kpi-fill');
    if (el) el.style.width = kpiPct.toFixed(1) + '%';
  }, 80);
}

async function renderYear(cfg, year) {
  document.getElementById('content-area').innerHTML =
    '<div class="loading"><div class="spin"></div>Đang tổng hợp 12 tháng...</div>';

  const luongCung = currentUser.luongCung || 0;
  const thuongShipPer = currentUser.thuongShip || 0;
  const rows = [];
  let totalLuong = 0, totalKpi = 0, totalShip = 0, totalTong = 0;
  const now = new Date();

  for (let m = 1; m <= 12; m++) {
    if (year > now.getFullYear() || (year === now.getFullYear() && m > now.getMonth() + 1)) {
      rows.push({ month: m, empty: true }); continue;
    }
    const monthKey = `${year}-${String(m).padStart(2,'0')}`;
    const monthCfg = (cfg.months || {})[monthKey] || {};
    const kpiTarget = monthCfg.kpiTarget || 0;
    const bonusPct  = monthCfg.bonusPct  || 0;
    const { revenue, shipCount } = await fetchMonthData(year, m);
    const phanDu   = Math.max(0, revenue - kpiTarget);
    const bonusKpi = phanDu * (bonusPct / 100);
    const bonusShip = shipCount * thuongShipPer;
    const tong = luongCung + bonusKpi + bonusShip;
    totalLuong += luongCung; totalKpi += bonusKpi; totalShip += bonusShip; totalTong += tong;
    rows.push({ month: m, revenue, shipCount, bonusKpi, bonusShip, tong });
  }

  const tbodyHTML = rows.map(r => {
    if (r.empty) return `<tr><td>${MONTH_NAMES[r.month-1]}</td><td colspan="4" style="color:var(--text3)">—</td></tr>`;
    return `<tr>
      <td>${MONTH_NAMES[r.month-1]}</td>
      <td>${fmtNum(r.revenue)}đ</td>
      <td style="color:var(--amber)">${fmtNum(r.bonusKpi)}đ</td>
      <td><span class="tag-ship">${r.shipCount}</span>${fmtNum(r.bonusShip)}đ</td>
      <td style="color:var(--green-mid);font-weight:600">${fmtNum(r.tong)}đ</td>
    </tr>`;
  }).join('');

  document.getElementById('content-area').innerHTML = `
    <div class="fade-up">
      <div class="card" style="margin-bottom:12px">
        <div class="stat-grid">
          <div class="stat-cell">
            <div class="stat-label">Tổng lương cứng</div>
            <div class="stat-value accent-green">${fmt(totalLuong)}</div>
          </div>
          <div class="stat-cell">
            <div class="stat-label">Tổng thưởng KPI</div>
            <div class="stat-value accent-amber">${fmt(totalKpi)}</div>
          </div>
          <div class="stat-cell">
            <div class="stat-label">Tổng thưởng ship</div>
            <div class="stat-value accent-purple">${fmt(totalShip)}</div>
          </div>
          <div class="stat-cell">
            <div class="stat-label">Tổng nhận cả năm</div>
            <div class="stat-value" style="color:var(--green)">${fmt(totalTong)}</div>
          </div>
        </div>
      </div>
      <div class="card">
        <div class="yt-wrap">
          <table class="yt">
            <thead>
              <tr>
                <th>Tháng</th>
                <th>Doanh thu</th>
                <th>Thưởng KPI</th>
                <th>Thưởng ship</th>
                <th>Tổng nhận</th>
              </tr>
            </thead>
            <tbody>${tbodyHTML}</tbody>
          </table>
        </div>
      </div>
    </div>
  `;
}

(function init() {
  const session = loadSession();
  if (session) { currentUser = session; showDashboard(); }
})();
</script>
</body>
</html>
