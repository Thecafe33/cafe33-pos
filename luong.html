<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lương — Xolifa</title>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-database-compat.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,300;0,14..32,400;0,14..32,500;0,14..32,600&display=swap');
:root{
  --g:#1a4a2e;--gm:#2d7a4f;
  --bg:#f2f2f7;--card:#fff;--card2:#f2f2f7;
  --b:rgba(0,0,0,.07);
  --t:#1c1c1e;--t2:#6e6e73;--t3:#c7c7cc;
  --amber:#f59e0b;--purple:#8b5cf6;--red:#ef4444;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-font-smoothing:antialiased;}
body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--t);min-height:100vh;}

#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.lc{width:100%;max-width:340px;}
.lc-mark{width:52px;height:52px;background:var(--g);border-radius:14px;margin:0 auto 24px;display:flex;align-items:center;justify-content:center;}
.lc h1{font-size:24px;font-weight:600;text-align:center;letter-spacing:-.4px;margin-bottom:4px;}
.lc p{font-size:14px;color:var(--t2);text-align:center;margin-bottom:32px;}
.lc input{display:block;width:100%;padding:13px 15px;margin-bottom:10px;background:var(--card);border:1px solid var(--b);border-radius:13px;font:500 15px/1 inherit;color:var(--t);outline:none;transition:border-color .15s;}
.lc input:focus{border-color:rgba(0,0,0,.22);}
.lc input::placeholder{color:var(--t3);font-weight:400;}
.btn-lg{width:100%;padding:14px;margin-top:4px;background:var(--g);color:#fff;border:none;border-radius:13px;font:600 15px/1 inherit;cursor:pointer;letter-spacing:-.1px;transition:opacity .15s;}
.btn-lg:hover{opacity:.87;}
.btn-lg:disabled{opacity:.4;cursor:default;}
.lerr{display:none;margin-top:10px;padding:11px 13px;background:#fef2f2;border:1px solid rgba(239,68,68,.18);border-radius:10px;font-size:13px;color:var(--red);text-align:center;}

#app{display:none;min-height:100vh;}
.bar{height:50px;padding:0 18px;display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,.85);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-bottom:1px solid var(--b);position:sticky;top:0;z-index:50;}
.bar-l{display:flex;align-items:center;gap:9px;}
.bar-mark{width:28px;height:28px;background:var(--g);border-radius:7px;display:flex;align-items:center;justify-content:center;}
.bar-title{font-size:14px;font-weight:600;letter-spacing:-.2px;}
.bar-r{display:flex;align-items:center;gap:8px;}
.av{width:26px;height:26px;border-radius:50%;background:var(--g);color:#fff;font-size:11px;font-weight:600;display:flex;align-items:center;justify-content:center;}
.uname{font-size:13px;font-weight:500;}
.btn-sm{padding:5px 12px;background:transparent;border:1px solid var(--b);border-radius:100px;font:500 12px/1 inherit;color:var(--t2);cursor:pointer;transition:all .15s;}
.btn-sm:hover{border-color:rgba(0,0,0,.18);color:var(--t);}

.body{max-width:600px;margin:0 auto;padding:24px 16px 80px;}

.top-row{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:22px;gap:12px;flex-wrap:wrap;}
.top-row-r{display:flex;align-items:center;gap:7px;}
.seg{display:flex;background:rgba(0,0,0,.06);border-radius:100px;padding:3px;gap:2px;}
.st{padding:5px 14px;border-radius:100px;border:none;font:500 13px/1 inherit;cursor:pointer;background:transparent;color:var(--t2);transition:all .15s;}
.st.on{background:var(--card);color:var(--t);box-shadow:0 1px 3px rgba(0,0,0,.1);}
.mnav{display:flex;align-items:center;gap:4px;background:var(--card);border:1px solid var(--b);border-radius:100px;padding:3px 5px;}
.mn-btn{width:26px;height:26px;border-radius:50%;border:none;background:transparent;color:var(--t2);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .12s;}
.mn-btn:hover{background:var(--card2);}
.mn-lbl{font-size:12px;font-weight:500;min-width:90px;text-align:center;letter-spacing:-.1px;}

.card{background:var(--card);border-radius:20px;border:1px solid var(--b);margin-bottom:10px;overflow:hidden;}

/* Hero */
.hero{padding:26px 22px 20px;}
.hero-lbl{font-size:11px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--t2);margin-bottom:8px;}
.hero-num{font-size:42px;font-weight:300;letter-spacing:-2px;color:var(--t);}
.hero-num sup{font-size:18px;font-weight:400;letter-spacing:0;vertical-align:super;margin-right:1px;}

/* KPI */
.kpi-row{padding:16px 22px;border-top:1px solid var(--b);}
.kpi-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px;}
.kpi-lbl{font-size:13px;font-weight:500;color:var(--t);}
.kpi-pct{font-size:13px;font-weight:600;color:var(--gm);}
.kpi-track{height:5px;background:var(--card2);border-radius:100px;overflow:hidden;}
.kpi-fill{height:100%;border-radius:100px;background:var(--g);transition:width .75s cubic-bezier(.16,1,.3,1);}
.kpi-range{display:flex;justify-content:space-between;margin-top:6px;font-size:11px;color:var(--t3);}

/* Rows */
.row-list{}
.row-item{display:flex;align-items:center;justify-content:space-between;padding:14px 22px;border-top:1px solid var(--b);}
.row-item:first-child{border-top:none;}
.row-l{display:flex;align-items:center;gap:12px;}
.ic{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.ic svg{width:16px;height:16px;}
.row-name{font-size:14px;font-weight:500;}
.row-desc{font-size:12px;color:var(--t2);margin-top:1px;}
.row-val{font-size:15px;font-weight:600;letter-spacing:-.3px;}
.row-total{background:var(--card2);}
.row-total .row-name{font-weight:600;}
.row-total .row-val{font-size:16px;}

/* Year table */
.tbl-wrap{overflow-x:auto;}
table.t{width:100%;border-collapse:collapse;font-size:13px;}
table.t th{padding:10px 16px;text-align:right;font-size:11px;font-weight:500;letter-spacing:.05em;text-transform:uppercase;color:var(--t2);border-bottom:1px solid var(--b);}
table.t th:first-child{text-align:left;}
table.t td{padding:12px 16px;border-bottom:1px solid var(--b);text-align:right;font-weight:500;}
table.t td:first-child{text-align:left;color:var(--t2);}
table.t tr:last-child td{border-bottom:none;}
table.t tr:hover td{background:var(--card2);}

.loading{display:flex;flex-direction:column;align-items:center;gap:12px;padding:56px 20px;color:var(--t2);font-size:14px;}
.spin{width:24px;height:24px;border:2px solid var(--b);border-top-color:var(--g);border-radius:50%;animation:sp .6s linear infinite;}
@keyframes sp{to{transform:rotate(360deg);}}
@keyframes fu{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
.fu{animation:fu .3s cubic-bezier(.16,1,.3,1) both;}
</style>
</head>
<body>

<div id="login-screen">
  <div class="lc">
    <div class="lc-mark">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
    </div>
    <h1>Bảng lương</h1>
    <p>Đăng nhập để xem thông tin lương</p>
    <input type="text" id="inp-user" placeholder="Tên đăng nhập" autocomplete="username">
    <input type="password" id="inp-pass" placeholder="Mật khẩu" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="btn-lg" id="btn-login" onclick="doLogin()">Đăng nhập</button>
    <div class="lerr" id="lerr"></div>
  </div>
</div>

<div id="app">
  <div class="bar">
    <div class="bar-l">
      <div class="bar-mark">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
      </div>
      <div class="bar-title">Xolifa · Lương</div>
    </div>
    <div class="bar-r">
      <div class="av" id="av">?</div>
      <div class="uname" id="uname">--</div>
      <button class="btn-sm" onclick="doLogout()">Đăng xuất</button>
    </div>
  </div>

  <div class="body">
    <div class="top-row">
      <div id="period-lbl" style="font-size:20px;font-weight:600;letter-spacing:-.4px;"></div>
      <div class="top-row-r">
        <div class="seg">
          <button class="st on" id="t-month" onclick="switchTab('month')">Tháng</button>
          <button class="st" id="t-year" onclick="switchTab('year')">Năm</button>
        </div>
        <div class="mnav" id="mnav">
          <button class="mn-btn" onclick="changeMonth(-1)">‹</button>
          <div class="mn-lbl" id="mn-lbl"></div>
          <button class="mn-btn" onclick="changeMonth(1)">›</button>
        </div>
      </div>
    </div>
    <div id="content"></div>
  </div>
</div>

<script>
const FC = {
  apiKey:"AIzaSyCNh1-16gYZ0P30Fkd-2tB-O89PXkPX9Lc",
  authDomain:"the-cafe-33.firebaseapp.com",
  databaseURL:"https://the-cafe-33-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:"the-cafe-33"
};
if(!firebase.apps.length) firebase.initializeApp(FC);
const fstore=firebase.firestore(), rtdb=firebase.database();

const MK=['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'];
const MN=['Tháng 1','Tháng 2','Tháng 3','Tháng 4','Tháng 5','Tháng 6','Tháng 7','Tháng 8','Tháng 9','Tháng 10','Tháng 11','Tháng 12'];
const fmt=n=>Math.round(n).toLocaleString('vi-VN')+'đ';
const fmtN=n=>Math.round(n).toLocaleString('vi-VN');

let user=null, tab='month', yr=new Date().getFullYear(), mo=new Date().getMonth()+1;

function save(u){sessionStorage.setItem('xl',JSON.stringify(u));}
function load(){const r=sessionStorage.getItem('xl');return r?JSON.parse(r):null;}
function clear(){sessionStorage.removeItem('xl');}

async function doLogin(){
  const u=document.getElementById('inp-user').value.trim();
  const p=document.getElementById('inp-pass').value;
  const err=document.getElementById('lerr'), btn=document.getElementById('btn-login');
  err.style.display='none';
  if(!u||!p){err.textContent='Vui lòng nhập đầy đủ.';err.style.display='block';return;}
  btn.disabled=true;btn.textContent='Đang đăng nhập...';
  try{
    const doc=await fstore.collection('xolifa_luong').doc('accounts').get();
    const accounts=doc.exists?(doc.data().list||[]):[];
    const match=accounts.find(a=>a.username===u&&a.password===p);
    if(!match) throw new Error('wrong');
    user=match; save(match); showApp();
  }catch(e){
    err.textContent=e.message==='wrong'?'Tài khoản hoặc mật khẩu không đúng.':'Lỗi kết nối. Thử lại.';
    err.style.display='block';
  }
  btn.disabled=false;btn.textContent='Đăng nhập';
}

function doLogout(){
  clear();user=null;
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('app').style.display='none';
  document.getElementById('inp-user').value='';
  document.getElementById('inp-pass').value='';
}

function showApp(){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='block';
  const init=(user.hoTen||user.username).charAt(0).toUpperCase();
  document.getElementById('av').textContent=init;
  document.getElementById('uname').textContent=user.hoTen||user.username;
  updateLabels(); render();
}

function switchTab(t){
  tab=t;
  document.getElementById('t-month').classList.toggle('on',t==='month');
  document.getElementById('t-year').classList.toggle('on',t==='year');
  document.getElementById('mnav').style.display=t==='month'?'flex':'none';
  updateLabels(); render();
}

function changeMonth(d){
  mo+=d;
  if(mo>12){mo=1;yr++;}
  if(mo<1){mo=12;yr--;}
  updateLabels(); render();
}

function updateLabels(){
  document.getElementById('mn-lbl').textContent=`${MN[mo-1]} ${yr}`;
  document.getElementById('period-lbl').textContent=tab==='month'?`${MN[mo-1]} ${yr}`:`Năm ${yr}`;
}

async function fetchMonth(year,month){
  const mk=MK[month-1], now=new Date();
  const isNow=(year===now.getFullYear()&&month===now.getMonth()+1);
  let rev=0, ships=0;
  for(let d=1;d<=new Date(year,month,0).getDate();d++){
    const dt=new Date(year,month-1,d);
    if(isNow&&dt>now) break;
    const ds=String(d).padStart(2,'0');
    try{
      const rtSnap=await rtdb.ref(`orders_xolifa/${mk}/${ds}`).once('value');
      const rtData=rtSnap.val()||{};
      let fsData={};
      try{
        const fsDoc=await fstore.collection('orders_xolifa_archive').doc(`${mk}_${ds}_${year}`).get();
        fsData=fsDoc.exists?(fsDoc.data().orders||{}):{};
      }catch(_){}
      const orders={...fsData,...rtData};
      Object.values(orders).forEach(o=>{
        rev+=(o.total||0)-(o.foodTotal||0);
        if(o.isShip===true) ships++;
      });
    }catch(_){}
  }
  return{rev,ships};
}

async function render(){
  document.getElementById('content').innerHTML='<div class="loading"><div class="spin"></div>Đang tải...</div>';
  try{
    const cfgDoc=await fstore.collection('xolifa_luong').doc('config').get();
    const cfg=cfgDoc.exists?cfgDoc.data():{};
    if(tab==='month') await renderMonth(cfg,yr,mo);
    else await renderYear(cfg,yr);
  }catch(e){
    document.getElementById('content').innerHTML=`<div class="loading" style="color:var(--red)">Lỗi: ${e.message}</div>`;
  }
}

const IC={
  salary:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v2"/><line x1="12" y1="12" x2="12" y2="16"/><line x1="10" y1="14" x2="14" y2="14"/></svg>`,
  kpi:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>`,
  ship:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M5 17H3a2 2 0 01-2-2V5a2 2 0 012-2h11a2 2 0 012 2v3"/><rect x="9" y="11" width="14" height="10" rx="1"/><circle cx="12" cy="21" r="1"/><circle cx="20" cy="21" r="1"/></svg>`,
  total:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>`
};

async function renderMonth(cfg,year,month){
  const mk=`${year}-${String(month).padStart(2,'0')}`;
  const mc=(cfg.months||{})[mk]||{};
  const kpiTarget=mc.kpiTarget||0, bonusPct=mc.bonusPct||0;
  const luong=user.luongCung||0, ship=user.thuongShip||0;

  const{rev,ships}=await fetchMonth(year,month);
  const phanDu=Math.max(0,rev-kpiTarget);
  const bKpi=phanDu*(bonusPct/100);
  const bShip=ships*ship;
  const tong=luong+bKpi+bShip;
  const kpiPct=kpiTarget>0?Math.min(100,rev/kpiTarget*100):0;

  document.getElementById('content').innerHTML=`<div class="fu">
    <div class="card">
      <div class="hero">
        <div class="hero-lbl">Tổng dự tính nhận</div>
        <div class="hero-num"><sup>₫</sup>${fmtN(tong)}</div>
      </div>
      <div class="kpi-row">
        <div class="kpi-head">
          <div class="kpi-lbl">Tiến độ KPI</div>
          <div class="kpi-pct">${kpiPct.toFixed(1)}%</div>
        </div>
        <div class="kpi-track"><div class="kpi-fill" id="kf" style="width:0%"></div></div>
        <div class="kpi-range">
          <span>${fmtN(rev)}đ thực tế</span>
          <span>Mục tiêu ${kpiTarget>0?fmtN(kpiTarget)+'đ':'chưa cấu hình'}</span>
        </div>
      </div>
      <div class="row-list">
        <div class="row-item">
          <div class="row-l">
            <div class="ic" style="background:#e8f5ee;color:var(--gm)">${IC.salary}</div>
            <div>
              <div class="row-name">Lương cứng</div>
              <div class="row-desc">Cố định hàng tháng</div>
            </div>
          </div>
          <div class="row-val" style="color:var(--gm)">${fmt(luong)}</div>
        </div>
        <div class="row-item">
          <div class="row-l">
            <div class="ic" style="background:#fef3c7;color:#b45309">${IC.kpi}</div>
            <div>
              <div class="row-name">Thưởng KPI</div>
              <div class="row-desc">${phanDu>0?`Vượt ${fmtN(phanDu)}đ × ${bonusPct}%`:kpiTarget>0?'Chưa đạt KPI':'Chưa cấu hình'}</div>
            </div>
          </div>
          <div class="row-val" style="color:var(--amber)">${fmt(bKpi)}</div>
        </div>
        <div class="row-item">
          <div class="row-l">
            <div class="ic" style="background:#f3e8ff;color:#7c3aed">${IC.ship}</div>
            <div>
              <div class="row-name">Thưởng ship</div>
              <div class="row-desc">${ships} đơn × ${fmt(ship)}</div>
            </div>
          </div>
          <div class="row-val" style="color:var(--purple)">${fmt(bShip)}</div>
        </div>
        <div class="row-item row-total">
          <div class="row-l">
            <div class="ic" style="background:var(--g);color:#fff">${IC.total}</div>
            <div><div class="row-name">Tổng nhận</div></div>
          </div>
          <div class="row-val" style="color:var(--g)">${fmt(tong)}</div>
        </div>
      </div>
    </div>
  </div>`;
  setTimeout(()=>{const el=document.getElementById('kf');if(el)el.style.width=kpiPct.toFixed(1)+'%';},80);
}

async function renderYear(cfg,year){
  document.getElementById('content').innerHTML='<div class="loading"><div class="spin"></div>Đang tổng hợp 12 tháng...</div>';
  const luong=user.luongCung||0, shipPer=user.thuongShip||0;
  const now=new Date();
  let tL=0,tK=0,tS=0,tT=0;
  const rows=[];

  for(let m=1;m<=12;m++){
    if(year>now.getFullYear()||(year===now.getFullYear()&&m>now.getMonth()+1)){
      rows.push({m,empty:true});continue;
    }
    const mk=`${year}-${String(m).padStart(2,'0')}`;
    const mc=(cfg.months||{})[mk]||{};
    const kpiTarget=mc.kpiTarget||0, bonusPct=mc.bonusPct||0;
    const{rev,ships}=await fetchMonth(year,m);
    const bKpi=Math.max(0,rev-kpiTarget)*(bonusPct/100);
    const bShip=ships*shipPer;
    const tong=luong+bKpi+bShip;
    tL+=luong;tK+=bKpi;tS+=bShip;tT+=tong;
    rows.push({m,rev,bKpi,bShip,tong,ships});
  }

  const tbody=rows.map(r=>{
    if(r.empty) return `<tr><td>${MN[r.m-1]}</td><td colspan="3" style="color:var(--t3)">—</td></tr>`;
    return`<tr>
      <td>${MN[r.m-1]}</td>
      <td>${fmtN(r.bKpi)}đ</td>
      <td>${r.ships} đơn · ${fmtN(r.bShip)}đ</td>
      <td style="color:var(--gm);font-weight:600">${fmtN(r.tong)}đ</td>
    </tr>`;
  }).join('');

  document.getElementById('content').innerHTML=`<div class="fu">
    <div class="card" style="margin-bottom:10px">
      <div class="row-list">
        <div class="row-item">
          <div class="row-l"><div class="ic" style="background:#e8f5ee;color:var(--gm)">${IC.salary}</div><div class="row-name">Tổng lương cứng</div></div>
          <div class="row-val" style="color:var(--gm)">${fmt(tL)}</div>
        </div>
        <div class="row-item">
          <div class="row-l"><div class="ic" style="background:#fef3c7;color:#b45309">${IC.kpi}</div><div class="row-name">Tổng thưởng KPI</div></div>
          <div class="row-val" style="color:var(--amber)">${fmt(tK)}</div>
        </div>
        <div class="row-item">
          <div class="row-l"><div class="ic" style="background:#f3e8ff;color:#7c3aed">${IC.ship}</div><div class="row-name">Tổng thưởng ship</div></div>
          <div class="row-val" style="color:var(--purple)">${fmt(tS)}</div>
        </div>
        <div class="row-item row-total">
          <div class="row-l"><div class="ic" style="background:var(--g);color:#fff">${IC.total}</div><div class="row-name">Tổng cả năm ${year}</div></div>
          <div class="row-val" style="color:var(--g)">${fmt(tT)}</div>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="tbl-wrap">
        <table class="t">
          <thead><tr><th>Tháng</th><th>Thưởng KPI</th><th>Thưởng ship</th><th>Tổng nhận</th></tr></thead>
          <tbody>${tbody}</tbody>
        </table>
      </div>
    </div>
  </div>`;
