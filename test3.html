<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>XOLIFA — Màn hình khách (Static Background V1)</title>

<!-- Font chữ cho khu vực Giỏ hàng -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;800;900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,700,1,0" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-auth-compat.js"></script>

<style>
/* ─── RESET CƠ BẢN ─────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 100vw; height: 100vh; margin: 0; padding: 0; overflow: hidden;
  background: #000; font-family: 'Montserrat', sans-serif;
  pointer-events: none; user-select: none;
}

/* ─── KHUNG CANVAS (1920x1080) ───────────────────────── */
#app {
  position: absolute; top: 0; left: 0;
  width: 1920px; height: 1080px;
  transform-origin: top left;
  background-color: #FAFAFA;
}

/* 1. ẢNH NỀN (Tấm ảnh Photoshop của bạn) */
#bg-image {
  position: absolute; top: 0; left: 0;
  width: 1920px; height: 1080px;
  object-fit: cover; z-index: 1;
}

/* ═════════ CÁC VÙNG ĐỘNG (ĐÈ LÊN TRÊN ẢNH NỀN) ═════════ */

/* 2. VÙNG SLIDE (Bên Trái) */
/* Căn tọa độ đè đúng vào ô màu nâu bên trái trong ảnh */
#zone-slide {
  position: absolute; z-index: 5;
  top: 105px; left: 40px; 
  width: 440px; height: 935px; /* Kích thước ước lượng theo ảnh */
  border-radius: 24px; overflow: hidden;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
  background: #000;
}
#slide-l1, #slide-l2 { position: absolute; inset: 0; transition: opacity 1s ease-in-out; opacity: 0; }
#slide-l1 img, #slide-l2 img { width: 100%; height: 100%; object-fit: cover; }
#slide-dots { position: absolute; bottom: 20px; left: 0; right: 0; display: flex; justify-content: center; gap: 8px; z-index: 10; }
.s-dot { width: 10px; height: 10px; border-radius: 50%; background: rgba(255,255,255,0.4); }
.s-dot.active { background: #fff; width: 24px; border-radius: 5px; }


/* 3. VÙNG VIDEO (Góc Trên Phải) */
/* Căn tọa độ đè đúng vào ô màu nâu góc trên bên phải */
#zone-video {
  position: absolute; z-index: 5;
  top: 35px; right: 40px;
  width: 440px; height: 350px;
  border-radius: 24px; overflow: hidden;
  background: #000;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}
#zone-video video { width: 100%; height: 100%; object-fit: cover; }


/* 4. VÙNG GIỎ HÀNG (Góc Dưới Phải) */
/* Căn tọa độ đè đúng vào ô màu nâu góc dưới bên phải */
#zone-cart {
  position: absolute; z-index: 5;
  bottom: 40px; right: 40px;
  width: 440px; height: 610px;
  background: #FFFFFF; /* Che ô màu nâu bằng nền trắng cho đơn hàng dễ đọc */
  border-radius: 24px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.1);
  display: flex; flex-direction: column; overflow: hidden;
}

.cart-header { background: #006241; color: #fff; padding: 20px; text-align: center; font-size: 24px; font-weight: 900; letter-spacing: 0.05em; }
#cart-customer-info { display: none; align-items: center; gap: 10px; background: #E6F4EE; padding: 12px 20px; color: #004f32; font-weight: 800; font-size: 18px; border-bottom: 2px solid #fff; }
#cart-customer-info .material-symbols-outlined { color: #006241; font-size: 26px; }

#cart-list { flex: 1; padding: 20px; overflow: hidden; display: flex; flex-direction: column; gap: 16px; }
.cart-item { display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 2px dashed #E5E7EB; padding-bottom: 16px; }
.c-qty { width: 32px; height: 32px; background: #006241; color: #fff; display: flex; align-items: center; justify-content: center; border-radius: 6px; font-size: 16px; font-weight: 900; margin-right: 12px; flex-shrink: 0; }
.c-name { flex: 1; font-size: 18px; font-weight: 800; line-height: 1.3; color: #111; }
.c-size { display: block; font-size: 14px; font-weight: 700; color: #666; margin-top: 4px; }
.c-price { font-size: 18px; font-weight: 900; color: #006241; margin-left: 10px; white-space: nowrap; }

#cart-footer { padding: 24px 20px; background: #FAFAFA; border-top: 2px solid #E5E7EB; }
.total-label { font-size: 16px; font-weight: 800; color: #666; text-transform: uppercase; }
.total-price { font-size: 40px; font-weight: 900; color: #006241; text-align: right; margin-top: 4px; line-height: 1; letter-spacing: -0.02em; }


/* 5. KHUNG LỚP PHỦ TEM "HẾT HÀNG" */
#sold-out-container {
  position: absolute; top: 0; left: 0;
  width: 1920px; height: 1080px;
  z-index: 10; /* Nằm trên ảnh nền nhưng dưới QR */
  pointer-events: none;
}
/* Thiết kế cái tem dán chữ TẠM HẾT */
.sold-out-stamp {
  position: absolute;
  background: rgba(220, 38, 38, 0.9); /* Màu đỏ */
  color: #FFF; font-weight: 900; font-size: 20px;
  padding: 4px 16px; border-radius: 6px;
  transform: rotate(-10deg);
  box-shadow: 0 4px 10px rgba(220, 38, 38, 0.4);
  letter-spacing: 0.05em;
  border: 2px solid #FFF;
}

/* 6. OVERLAYS QR & SUCCESS */
#view-qr, #view-success { display: none; position: absolute; inset: 0; z-index: 100; backdrop-filter: blur(24px); flex-direction: column; align-items: center; justify-content: center; }
#view-qr { background: rgba(245, 245, 245, 0.95); }
#view-qr img { width: 450px; height: 450px; border-radius: 20px; margin: 40px 0; border: 6px solid #006241; box-shadow: 0 20px 50px rgba(0,0,0,0.1); }
#qr-amount { font-size: 90px; font-weight: 900; color: #006241; letter-spacing: -0.02em; }
#view-success { background: #006241; color: #fff; }
#view-success .material-symbols-outlined { font-size: 250px; margin-bottom: 30px; }
#view-success h2 { font-size: 90px; font-weight: 900; letter-spacing: 0.02em; }
</style>
</head>

<body>
<div id="app">
  
  <!-- 1. ẢNH NỀN MENU GỐC -->
  <!-- BẠN THAY ĐƯỜNG LINK ẢNH THIẾT KẾ CỦA BẠN VÀO ĐÂY -->
  <img id="bg-image" src="https://firebasestorage.googleapis.com/v0/b/the-cafe-33.firebasestorage.app/o/bg-menu-sample.jpg?alt=media" onerror="this.src='https://via.placeholder.com/1920x1080/D5BCA2/444?text=HAY+THEM+ANH+NEN+CUA+BAN+VAO+CODE'">

  <!-- 2. VÙNG CHẠY SLIDE TRÁI -->
  <div id="zone-slide">
    <div id="slide-l1"></div>
    <div id="slide-l2"></div>
    <div id="slide-dots"></div>
  </div>

  <!-- 3. VÙNG CHẠY VIDEO PHẢI -->
  <div id="zone-video">
    <!-- Bạn có thể thay link video hoặc link Youtube/Drive tại đây -->
    <video src="https://www.w3schools.com/html/mov_bbb.mp4" autoplay loop muted playsinline></video>
  </div>

  <!-- 4. VÙNG GIỎ HÀNG (CART) -->
  <div id="zone-cart">
    <div class="cart-header">ĐƠN HÀNG HIỆN TẠI</div>
    <div id="cart-customer-info">
      <span class="material-symbols-outlined">person</span>
      <span id="cart-customer-name"></span>
    </div>
    <div id="cart-list">
      <div style="text-align:center; color:#9ca3af; margin-top: 80px; font-weight: 800; font-size: 20px;">
        <span class="material-symbols-outlined" style="font-size: 70px; opacity: 0.2; display:block; margin-bottom: 15px;">receipt_long</span>
        Chưa có món nào
      </div>
    </div>
    <div id="cart-footer">
      <div class="total-label">TỔNG THANH TOÁN</div>
      <div class="total-price" id="total-price">0đ</div>
    </div>
  </div>

  <!-- 5. CONTAINER CHỨA CÁC TEM "TẠM HẾT" -->
  <div id="sold-out-container"></div>

  <!-- OVERLAYS THANH TOÁN -->
  <div id="view-qr">
    <h2 style="font-size: 56px; font-weight: 900; color: #111;">VUI LÒNG QUÉT MÃ QR</h2>
    <img id="qr-image" src="">
    <p style="font-size:32px;font-weight:800;color:#666;text-transform:uppercase;">Số tiền thanh toán</p>
    <div id="qr-amount">0đ</div>
  </div>
  <div id="view-success">
    <span class="material-symbols-outlined">check_circle</span>
    <h2>THANH TOÁN THÀNH CÔNG!</h2>
    <p style="font-size: 40px; margin-top: 20px; font-weight: 700;">Xolifa xin chân thành cảm ơn quý khách</p>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════
// 1. ÉP KHUNG VỪA MÀN HÌNH TV (ANTI-ZOOM)
// ══════════════════════════════════════════════════════
function scaleToFit() {
    var app = document.getElementById('app');
    var scale = Math.min(window.innerWidth / 1920, window.innerHeight / 1080);
    app.style.transform = "scale(" + scale + ")";
    app.style.left = ((window.innerWidth - (1920 * scale)) / 2) + "px";
    app.style.top = ((window.innerHeight - (1080 * scale)) / 2) + "px";
}
window.addEventListener('resize', scaleToFit);
scaleToFit();

// ══════════════════════════════════════════════════════
// 2. FIREBASE INIT
// ══════════════════════════════════════════════════════
var firebaseConfig = {
    apiKey: "AIzaSyCNh1-16gYZ0P30Fkd-2tB-O89PXkPX9Lc",
    authDomain: "the-cafe-33.firebaseapp.com",
    databaseURL: "https://the-cafe-33-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "the-cafe-33",
    storageBucket: "the-cafe-33.appspot.com",
};
if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
var db     = firebase.database();
var fstore = firebase.firestore();
var auth   = firebase.auth();

// ══════════════════════════════════════════════════════
// 3. THUẬT TOÁN ĐÓNG DẤU "TẠM HẾT" THEO TỌA ĐỘ
// ══════════════════════════════════════════════════════
/* 
  BẢN ĐỒ TỌA ĐỘ:
  Bạn tự điều chỉnh x (trái sang), y (trên xuống) bằng đơn vị Pixel.
  Lấy tọa độ bằng cách mở ảnh bằng MS Paint hoặc Photoshop, trỏ chuột vào tên món là thấy thông số x,y.
*/
const SOLD_OUT_MAP = {
  "Sữa gạo Phù Nam": { x: 500, y: 380 },
  "Sữa gạo Matcha": { x: 500, y: 430 },
  "Trà sữa nguyên lá": { x: 500, y: 480 },
  "Cà phê latte": { x: 500, y: 650 },
  "Choco latte": { x: 500, y: 730 },
  "Đen đá": { x: 500, y: 810 },
  // ... Thêm các món khác vào đây
  "Trà lài thơm chanh dây": { x: 1050, y: 580 },
  "Trà sen vàng": { x: 1050, y: 680 }
};

function renderSoldOutStickers() {
    db.ref('menu_xolifa').once('value', function(snap) {
        var raw = snap.val();
        var menuData = raw ? (Array.isArray(raw) ? raw : Object.values(raw)) : [];
        var container = document.getElementById('sold-out-container');
        container.innerHTML = '';

        menuData.forEach(function(item) {
            // Kiểm tra trạng thái hết hàng của POS (Tùy cấu trúc DB của bạn, ví dụ: status == 0, is_active == false...)
            // Ở đây tôi ví dụ biến `out_of_stock` hoặc `status == 0`
            let isSoldOut = item.out_of_stock === true || item.status === 0 || item.status === 'out_of_stock';
            
            if (isSoldOut && item.name && SOLD_OUT_MAP[item.name]) {
                var coords = SOLD_OUT_MAP[item.name];
                var sticker = document.createElement('div');
                sticker.className = 'sold-out-stamp';
                sticker.textContent = 'TẠM HẾT';
                sticker.style.left = coords.x + 'px';
                sticker.style.top = coords.y + 'px';
                container.appendChild(sticker);
            }
        });
    });
}


// ══════════════════════════════════════════════════════
// 4. SLIDES BÊN TRÁI
// ══════════════════════════════════════════════════════
var DEFAULT_SLIDES = [
    { type:'image', src:'https://firebasestorage.googleapis.com/v0/b/the-cafe-33.firebasestorage.app/o/1768316658706.jpg?alt=media', duration:6000 },
    { type:'image', src:'https://firebasestorage.googleapis.com/v0/b/the-cafe-33.firebasestorage.app/o/1770299826548.jpg?alt=media', duration:6000 }
];
var slidePlaylist = DEFAULT_SLIDES.slice(), slideIndex = -1, slideActiveLayer = 1, slideTimer = null;

function nextSlide() {
    if (!slidePlaylist.length) return;
    slideIndex = (slideIndex + 1) % slidePlaylist.length;
    var dots = document.querySelectorAll('.s-dot');
    dots.forEach(function(d,i){ d.classList.toggle('active', i===slideIndex); });
    
    var item = slidePlaylist[slideIndex];
    var backId = slideActiveLayer === 1 ? 'slide-l2' : 'slide-l1';
    var frontId = slideActiveLayer === 1 ? 'slide-l1' : 'slide-l2';
    var backEl = document.getElementById(backId), frontEl = document.getElementById(frontId);
    backEl.innerHTML = '';
    
    var el = new Image(); el.src = item.src;
    el.onload = function(){
        backEl.style.opacity = '1';
        setTimeout(function(){ frontEl.style.opacity = '0'; }, 100);
        slideActiveLayer = slideActiveLayer === 1 ? 2 : 1;
        slideTimer = setTimeout(nextSlide, item.duration);
    };
    backEl.appendChild(el);
}

// ══════════════════════════════════════════════════════
// 5. LẮNG NGHE POS ĐỂ HIỂN THỊ GIỎ HÀNG
// ══════════════════════════════════════════════════════
auth.signInWithEmailAndPassword("elio@thecafe33.com", "Thecafe33ty").then(function() {
    nextSlide(); 
    renderSoldOutStickers(); // Gọi hàm dán tem hết hàng lúc khởi động
    listenToPOS();
    
    // Nếu bạn muốn TV tự động cập nhật tem hết hàng mỗi 1 phút thì mở dòng này ra
    // setInterval(renderSoldOutStickers, 60000); 
});

function listenToPOS() {
    db.ref('session_display_xolifa').on('value', function(snap) {
        var data = snap.val();
        if (!data || data.state === 'idle') { resetScreen(); return; }

        if (data.state === 'qr_payment') {
            document.getElementById('view-qr').style.display = 'flex';
            document.getElementById('qr-image').src = data.qrUrl || '';
            document.getElementById('qr-amount').textContent = Number(data.amount||0).toLocaleString('vi-VN') + 'đ';
            return;
        }
        if (data.state === 'success') {
            document.getElementById('view-qr').style.display = 'none';
            document.getElementById('view-success').style.display = 'flex';
            setTimeout(function(){ resetScreen(); }, 5000);
            return;
        }
        
        document.getElementById('view-qr').style.display = 'none';
        document.getElementById('view-success').style.display = 'none';
        renderCart(data);
    });
}

function renderCart(data) {
    var custName = data.customerName || "";
    var custBox = document.getElementById('cart-customer-info');
    
    if (custName && custName.toLowerCase() !== "khách mới" && custName.toLowerCase() !== "khách lẻ") {
        custBox.style.display = 'flex';
        document.getElementById('cart-customer-name').textContent = custName;
    } else {
        custBox.style.display = 'none';
    }

    document.getElementById('total-price').textContent = Number(data.total || 0).toLocaleString('vi-VN') + 'đ';
    
    var listEl = document.getElementById('cart-list');
    var cart = data.cart || [];

    if (cart.length === 0) { 
        listEl.innerHTML = `
            <div style="text-align:center; color:#9ca3af; margin-top: 80px; font-weight: 800; font-size: 20px;">
                <span class="material-symbols-outlined" style="font-size: 70px; opacity: 0.2; display:block; margin-bottom: 15px;">receipt_long</span>
                Chưa có món nào
            </div>`;
        return; 
    }

    listEl.innerHTML = '';
    cart.forEach(function(item) {
        var sizeStr = item.size ? `<span class="c-size">Size: ${item.size}</span>` : '';
        var div = document.createElement('div');
        div.className = 'cart-item';
        div.innerHTML = `
            <div class="c-qty">${item.qty||1}</div>
            <div style="flex:1;">
                <div class="c-name">${item.name||''}</div>
                ${sizeStr}
            </div>
            <div class="c-price">${((item.price||0)*(item.qty||1)).toLocaleString('vi-VN')}đ</div>
        `;
        listEl.appendChild(div);
    });
}

function resetScreen() {
    document.getElementById('view-qr').style.display = 'none';
    document.getElementById('view-success').style.display = 'none';
    document.getElementById('cart-customer-info').style.display = 'none';
    document.getElementById('total-price').textContent = '0đ';
    document.getElementById('cart-list').innerHTML = `
        <div style="text-align:center; color:#9ca3af; margin-top: 80px; font-weight: 800; font-size: 20px;">
            <span class="material-symbols-outlined" style="font-size: 70px; opacity: 0.2; display:block; margin-bottom: 15px;">receipt_long</span>
            Chưa có món nào
        </div>`;
}
</script>
</body>
</html>
