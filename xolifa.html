<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0f172a">
  <title>POS XOLIFA - Mobile</title>
  <style>
    :root {
      --bg: #0f172a; --surface: #1e293b; --surface-hover: #334155;
      --primary: #3b82f6; --primary-dark: #2563eb; --success: #10b981; --warning: #f59e0b; --danger: #ef4444;
      --text: #f8fafc; --text-muted: #94a3b8; --border: #334155;
      --radius: 12px; --shadow: 0 4px 12px rgba(0,0,0,0.4);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
    
    /* Header */
    header { padding: 12px 16px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .logo { font-weight: 700; font-size: 1.2rem; letter-spacing: 1px; }
    .sync-status { font-size: 0.8rem; padding: 4px 8px; border-radius: 20px; background: var(--surface-hover); display: flex; align-items: center; gap: 6px; }
    .sync-dot { width: 8px; height: 8px; border-radius: 50%; }
    .sync-dot.online { background: var(--success); box-shadow: 0 0 6px var(--success); }
    .sync-dot.offline { background: var(--warning); }

    /* Main Content */
    main { flex: 1; overflow-y: auto; padding: 16px; padding-bottom: 80px; display: none; }
    main.active { display: block; }

    /* POS Layout */
    .category-tabs { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 10px; margin-bottom: 12px; }
    .cat-btn { padding: 8px 14px; background: var(--surface); border: 1px solid var(--border); border-radius: 20px; color: var(--text-muted); white-space: nowrap; font-size: 0.9rem; cursor: pointer; }
    .cat-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
    .menu-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
    .menu-item { background: var(--surface); padding: 12px; border-radius: var(--radius); text-align: center; cursor: pointer; position: relative; border: 1px solid transparent; transition: 0.2s; }
    .menu-item:active { transform: scale(0.98); border-color: var(--primary); }
    .menu-item img { width: 100%; height: 80px; object-fit: cover; border-radius: 8px; margin-bottom: 8px; background: #2d3748; }
    .menu-item h3 { font-size: 0.95rem; margin-bottom: 4px; }
    .menu-item span { color: var(--primary); font-weight: 600; font-size: 0.9rem; }

    /* Cart Bar */
    .cart-bar { position: fixed; bottom: 70px; left: 16px; right: 16px; background: var(--surface); padding: 12px 16px; border-radius: var(--radius); display: flex; justify-content: space-between; align-items: center; box-shadow: var(--shadow); cursor: pointer; z-index: 10; transform: translateY(120%); transition: 0.3s; }
    .cart-bar.show { transform: translateY(0); }
    .cart-info h4 { font-size: 0.9rem; color: var(--text-muted); }
    .cart-info p { font-size: 1.1rem; font-weight: 700; color: var(--text); }
    .cart-btn { background: var(--primary); color: white; padding: 8px 16px; border-radius: 20px; font-weight: 600; font-size: 0.9rem; }

    /* Checkout Sheet */
    .sheet-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100; opacity: 0; pointer-events: none; transition: 0.3s; }
    .sheet-overlay.active { opacity: 1; pointer-events: auto; }
    .checkout-sheet { position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg); border-top-left-radius: 20px; border-top-right-radius: 20px; padding: 20px; transform: translateY(100%); transition: 0.3s cubic-bezier(0.2, 0.8, 0.2, 1); max-height: 85vh; overflow-y: auto; z-index: 101; }
    .checkout-sheet.active { transform: translateY(0); }
    .sheet-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; border-bottom: 1px solid var(--border); padding-bottom: 12px; }
    .payment-methods { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 16px; }
    .pay-btn { padding: 14px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-weight: 500; cursor: pointer; text-align: center; }
    .pay-btn.selected { background: var(--primary); border-color: var(--primary); color: white; }
    .amount-input { width: 100%; padding: 14px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; color: white; font-size: 1.1rem; margin-bottom: 12px; }
    .quick-cash { display: flex; gap: 8px; margin-bottom: 16px; overflow-x: auto; }
    .quick-cash button { padding: 8px 12px; background: var(--surface-hover); border: none; border-radius: 8px; color: var(--text); cursor: pointer; white-space: nowrap; }
    .confirm-btn { width: 100%; padding: 16px; background: var(--success); color: white; border: none; border-radius: 12px; font-size: 1rem; font-weight: 600; cursor: pointer; margin-top: 8px; }
    .confirm-btn:disabled { opacity: 0.5; pointer-events: none; }

    /* Management / Settings */
    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 6px; }
    .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 12px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; color: white; font-size: 0.95rem; }
    .printer-presets { display: flex; gap: 8px; margin-bottom: 12px; }
    .preset { flex: 1; padding: 10px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; text-align: center; cursor: pointer; font-size: 0.85rem; }
    .preset.active { border-color: var(--primary); background: rgba(59, 130, 246, 0.15); color: var(--primary); }
    .range-wrap { display: flex; align-items: center; gap: 10px; }
    .range-wrap input { flex: 1; accent-color: var(--primary); }

    /* Reports / History */
    .stat-card { background: var(--surface); padding: 14px; border-radius: 10px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
    .stat-card h4 { font-size: 0.85rem; color: var(--text-muted); }
    .stat-card p { font-size: 1.2rem; font-weight: 600; }
    .chip-group { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 8px; margin-bottom: 12px; }
    .chip { padding: 6px 12px; background: var(--surface-hover); border-radius: 15px; font-size: 0.8rem; cursor: pointer; white-space: nowrap; border: 1px solid transparent; }
    .chip.active { background: var(--primary); color: white; }

    /* Bottom Nav */
    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; height: 65px; background: var(--surface); border-top: 1px solid var(--border); display: flex; justify-content: space-around; align-items: center; z-index: 90; padding-bottom: env(safe-area-inset-bottom); }
    .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: var(--text-muted); font-size: 0.7rem; cursor: pointer; padding: 8px 12px; }
    .nav-item.active { color: var(--primary); }
    .nav-item svg { width: 22px; height: 22px; fill: currentColor; }

    /* Toast */
    .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-20px); background: var(--surface); padding: 10px 16px; border-radius: 20px; box-shadow: var(--shadow); opacity: 0; pointer-events: none; transition: 0.3s; z-index: 200; font-size: 0.9rem; display: flex; align-items: center; gap: 8px; }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

    /* Utilities */
    .hidden { display: none !important; }
    .text-center { text-align: center; }
    .mt-4 { margin-top: 16px; }
    .flex-between { display: flex; justify-content: space-between; align-items: center; }
  </style>
</head>
<body>

  <!-- Header -->
  <header>
    <div class="logo">XOLIFA</div>
    <div class="sync-status" id="syncStatus">
      <span class="sync-dot online" id="syncDot"></span>
      <span id="syncText">Đồng bộ</span>
    </div>
  </header>

  <!-- Main Views -->
  <main id="view-pos" class="active">
    <div class="category-tabs" id="catTabs">
      <button class="cat-btn active" data-cat="all">Tất cả</button>
      <button class="cat-btn" data-cat="cafe">Cà phê</button>
      <button class="cat-btn" data-cat="tra">Trà</button>
      <button class="cat-btn" data-cat="banh">Bánh ngọt</button>
    </div>
    <div class="menu-grid" id="menuGrid">
      <!-- Dynamic items -->
    </div>
  </main>

  <main id="view-history">
    <h3 class="mb-4">Lịch sử đơn</h3>
    <div id="historyList"></div>
  </main>

  <main id="view-report">
    <div class="chip-group" id="reportChips">
      <span class="chip active" data-range="today">Hôm nay</span>
      <span class="chip" data-range="week">7 ngày</span>
      <span class="chip" data-range="month">30 ngày</span>
    </div>
    <div class="stat-card"><h4>Tổng thu</h4><p id="totalRev">0 ₫</p></div>
    <div class="stat-card"><h4>Tiền mặt</h4><p id="cashRev">0 ₫</p></div>
    <div class="stat-card"><h4>Chuyển khoản</h4><p id="bankRev">0 ₫</p></div>
  </main>

  <main id="view-manage">
    <div class="chip-group">
      <span class="chip active" onclick="switchManage('menu')">Menu</span>
      <span class="chip" onclick="switchManage('printer')">Máy in</span>
    </div>

    <div id="manage-menu">
      <div class="form-group"><label>Tên món</label><input type="text" id="itemName"></div>
      <div class="flex-between">
        <div class="form-group" style="flex:1; margin-right:8px;"><label>Giá M</label><input type="number" id="priceM"></div>
        <div class="form-group" style="flex:1;"><label>Giá L</label><input type="number" id="priceL"></div>
      </div>
      <button class="confirm-btn" onclick="addMenuItem()">Thêm món</button>
    </div>

    <div id="manage-printer" class="hidden">
      <div class="printer-presets">
        <button class="preset active" onclick="setPrintPreset(this, 'default')">Mặc định</button>
        <button class="preset" onclick="setPrintPreset(this, 'high')">Nét cao</button>
        <button class="preset" onclick="setPrintPreset(this, 'eco')">Tiết kiệm</button>
      </div>
      <div class="form-group"><label>Căn lề</label><div class="range-wrap"><span>Trái</span><input type="range" min="0" max="2" value="1" id="alignRange"><span>Phải</span></div></div>
      <div class="form-group"><label>Dòng cuối tem</label><input type="text" value="Cảm ơn quý khách!" id="footerText"></div>
      <button class="confirm-btn" onclick="savePrinterSettings()">Lưu cấu hình</button>
    </div>
  </main>

  <!-- Cart Floating Bar -->
  <div class="cart-bar" id="cartBar" onclick="openCheckout()">
    <div class="cart-info"><h4 id="cartCount">0 món</h4><p id="cartTotal">0 ₫</p></div>
    <button class="cart-btn">Thanh toán</button>
  </div>

  <!-- Checkout Bottom Sheet -->
  <div class="sheet-overlay" id="overlay" onclick="closeCheckout()"></div>
  <div class="checkout-sheet" id="checkoutSheet">
    <div class="sheet-header">
      <h3>Thanh toán</h3>
      <span onclick="closeCheckout()" style="cursor:pointer; font-size:1.2rem;">✕</span>
    </div>
    <div class="form-group"><label>Tổng cộng</label><div style="font-size:1.4rem; font-weight:700; color:var(--success);" id="checkoutTotal">0 ₫</div></div>
    <div class="payment-methods">
      <button class="pay-btn selected" onclick="selectPay('cash', this)">💵 Tiền mặt</button>
      <button class="pay-btn" onclick="selectPay('transfer', this)">📱 Chuyển khoản</button>
    </div>
    
    <div id="cashInput">
      <div class="quick-cash">
        <button onclick="setCash(50000)">50k</button>
        <button onclick="setCash(100000)">100k</button>
        <button onclick="setCash(200000)">200k</button>
        <button onclick="setCash(500000)">500k</button>
      </div>
      <input type="number" class="amount-input" id="cashGiven" placeholder="Nhập tiền khách đưa..." oninput="calcChange()">
      <div class="flex-between mt-4" style="margin-bottom:16px;"><span style="color:var(--text-muted)">Tiền thừa</span><span style="font-weight:700; font-size:1.1rem;" id="changeAmount">0 ₫</span></div>
    </div>

    <div id="transferInfo" class="hidden text-center mt-4" style="background:var(--surface); padding:12px; border-radius:10px; margin-bottom:16px;">
      <p style="margin-bottom:8px;">Quét mã hoặc kiểm tra tài khoản</p>
      <button class="cart-btn" onclick="confirmTransfer()" style="background:var(--warning); color:black;">✅ Đã nhận tiền</button>
    </div>

    <button class="confirm-btn" id="confirmPayBtn" onclick="processPayment()">Xác nhận thanh toán</button>
  </div>

  <!-- Bottom Nav -->
  <nav class="bottom-nav">
    <div class="nav-item active" onclick="switchView('pos')"><svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V5h14v14zM7 10h2v7H7zm4-3h2v10h-2zm4-4h2v14h-2z"/></svg>POS</div>
    <div class="nav-item" onclick="switchView('history')"><svg viewBox="0 0 24 24"><path d="M13 3c-4.97 0-9 4.03-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42C8.27 19.99 10.51 21 13 21c4.97 0 9-4.03 9-9s-4.03-9-9-9zm-1 5v5l4.28 2.54.72-1.21-3.5-2.08V8H12z"/></svg>Lịch sử</div>
    <div class="nav-item" onclick="switchView('report')"><svg viewBox="0 0 24 24"><path d="M3.5 18.49l6-6.01 4 4L22 6.92l-1.41-1.41-7.09 7.97-4-4L2 16.99z"/></svg>Báo cáo</div>
    <div class="nav-item" onclick="switchView('manage')"><svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 0 0 .12-.61l-1.92-3.32a.488.488 0 0 0-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.484.484 0 0 0-.48-.41h-3.84a.48.48 0 0 0-.48.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96a.48.48 0 0 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58a.49.49 0 0 0-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.28.41.48.41h3.84c.24 0 .44-.17.48-.41l.36-2.54c.59-.24 1.13-.57 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.21.08-.47-.12-.61l-2.01-1.58zM12 15.6A3.6 3.6 0 1 1 12 8.4a3.6 3.6 0 0 1 0 7.2z"/></svg>Quản lý</div>
  </nav>

  <!-- Toast -->
  <div class="toast" id="toast"><span id="toastIcon">✓</span><span id="toastMsg"></span></div>

  <script>
    // State
    const state = { cart: [], total: 0, cash: 0, change: 0, method: 'cash', orders: [] };
    const menu = [
      {id:1, name:'Cà phê đen', priceM:25000, priceL:35000, cat:'cafe'},
      {id:2, name:'Bạc xỉu', priceM:30000, priceL:40000, cat:'cafe'},
      {id:3, name:'Trà đào cam sả', priceM:35000, priceL:45000, cat:'tra'},
      {id:4, name:'Bánh mì que', priceM:15000, priceL:0, cat:'banh'}
    ];

    // Init
    document.addEventListener('DOMContentLoaded', () => {
      renderMenu('all');
      setupTabs();
      simulateSync();
    });

    function renderMenu(cat) {
      const grid = document.getElementById('menuGrid');
      grid.innerHTML = menu.filter(m => cat === 'all' || m.cat === cat).map(m => `
        <div class="menu-item" onclick="addToCart(${m.id})">
          <div style="height:80px; background:#2d3748; border-radius:8px; margin-bottom:8px; display:flex; align-items:center; justify-content:center; color:#555;">Ảnh</div>
          <h3>${m.name}</h3>
          <span>${m.priceM.toLocaleString()}₫</span>
        </div>
      `).join('');
    }

    function setupTabs() {
      document.querySelectorAll('.cat-btn').forEach(b => b.onclick = function() {
        document.querySelectorAll('.cat-btn').forEach(x => x.classList.remove('active'));
        this.classList.add('active');
        renderMenu(this.dataset.cat);
      });
      document.querySelectorAll('.chip[data-range]').forEach(c => c.onclick = function() {
        document.querySelectorAll('.chip[data-range]').forEach(x => x.classList.remove('active'));
        this.classList.add('active');
        // Logic cập nhật báo cáo theo ngày
      });
    }

    // Cart Logic
    function addToCart(id) {
      const item = menu.find(m => m.id === id);
      const exist = state.cart.find(c => c.id === id);
      if(exist) exist.qty++; else state.cart.push({...item, qty: 1});
      updateCart();
      showToast('✓ Đã thêm ' + item.name);
    }

    function updateCart() {
      state.total = state.cart.reduce((a, c) => a + (c.priceM * c.qty), 0);
      const bar = document.getElementById('cartBar');
      document.getElementById('cartCount').textContent = `${state.cart.reduce((a,c)=>a+c.qty,0)} món`;
      document.getElementById('cartTotal').textContent = `${state.total.toLocaleString()}₫`;
      bar.classList.toggle('show', state.cart.length > 0);
    }

    // Checkout
    function openCheckout() {
      document.getElementById('overlay').classList.add('active');
      document.getElementById('checkoutSheet').classList.add('active');
      document.getElementById('checkoutTotal').textContent = `${state.total.toLocaleString()}₫`;
      document.getElementById('cashGiven').value = '';
      document.getElementById('changeAmount').textContent = '0 ₫';
      document.getElementById('cashInput').classList.remove('hidden');
      document.getElementById('transferInfo').classList.add('hidden');
      document.getElementById('confirmPayBtn').disabled = false;
      state.method = 'cash';
      document.querySelectorAll('.pay-btn').forEach((b,i) => b.classList.toggle('selected', i===0));
    }

    function closeCheckout() {
      document.getElementById('overlay').classList.remove('active');
      document.getElementById('checkoutSheet').classList.remove('active');
    }

    function selectPay(m, btn) {
      state.method = m;
      document.querySelectorAll('.pay-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      if(m === 'cash') {
        document.getElementById('cashInput').classList.remove('hidden');
        document.getElementById('transferInfo').classList.add('hidden');
      } else {
        document.getElementById('cashInput').classList.add('hidden');
        document.getElementById('transferInfo').classList.remove('hidden');
      }
    }

    function setCash(amt) {
      document.getElementById('cashGiven').value = amt;
      calcChange();
    }

    function calcChange() {
      const given = parseFloat(document.getElementById('cashGiven').value) || 0;
      state.change = given - state.total;
      document.getElementById('changeAmount').textContent = state.change > 0 ? `${state.change.toLocaleString()}₫` : '0 ₫';
      document.getElementById('changeAmount').style.color = state.change < 0 ? 'var(--danger)' : 'var(--text)';
      document.getElementById('confirmPayBtn').disabled = given < state.total;
    }

    function confirmTransfer() {
      document.getElementById('transferInfo').innerHTML = `<div style="padding:20px; background:rgba(16,185,129,0.2); border-radius:10px;">✅ Đã xác nhận nhận tiền. Nhấn xác nhận để in.</div>`;
      document.getElementById('confirmPayBtn').disabled = false;
    }

    function processPayment() {
      // Ẩn sheet, xử lý in & đồng bộ
      closeCheckout();
      state.orders.push({ time: new Date().toLocaleTimeString(), total: state.total, method: state.method, items: [...state.cart] });
      showToast('🖨️ Đang in hóa đơn...');
      // Reset cart
      state.cart = [];
      updateCart();
      updateHistory();
      updateReport();
      simulateSync();
    }

    // Views
    function switchView(view) {
      document.querySelectorAll('main').forEach(m => m.classList.remove('active'));
      document.getElementById(`view-${view}`).classList.add('active');
      document.querySelectorAll('.nav-item').forEach((n,i) => n.classList.toggle('active', ['pos','history','report','manage'][i] === view));
    }

    function switchManage(type) {
      document.getElementById('manage-menu').classList.toggle('hidden', type !== 'menu');
      document.getElementById('manage-printer').classList.toggle('hidden', type !== 'printer');
    }

    function setPrintPreset(btn, preset) {
      document.querySelectorAll('.preset').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      showToast(`Đã chọn chế độ in: ${btn.textContent}`);
    }

    function savePrinterSettings() {
      showToast('✅ Đã lưu cấu hình máy in');
    }

    function addMenuItem() {
      const name = document.getElementById('itemName').value;
      if(!name) return showToast('⚠️ Vui lòng nhập tên món');
      showToast(`✅ Đã thêm ${name} vào menu`);
      document.getElementById('itemName').value = '';
      document.getElementById('priceM').value = '';
      document.getElementById('priceL').value = '';
    }

    // Report/History Mock
    function updateHistory() {
      document.getElementById('historyList').innerHTML = state.orders.map(o => `
        <div class="stat-card"><div><h4>${o.time}</h4><span style="font-size:0.8rem; color:var(--text-muted)">${o.items.length} món</span></div><p>${o.total.toLocaleString()}₫</p></div>
      `).join('');
    }
    function updateReport() {
      document.getElementById('totalRev').textContent = state.orders.reduce((a,o)=>a+o.total,0).toLocaleString() + ' ₫';
    }

    // Sync Simulation (Thay thế nút "Lưu Firebase" thủ công)
    function simulateSync() {
      const dot = document.getElementById('syncDot');
      const txt = document.getElementById('syncText');
      txt.textContent = '🔄 Đang đồng bộ...';
      setTimeout(() => {
        dot.className = 'sync-dot online';
        txt.textContent = 'Đồng bộ';
      }, 1200);
    }

    // Toast
    function showToast(msg) {
      const t = document.getElementById('toast');
      document.getElementById('toastMsg').textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2000);
    }
  </script>
</body>
