<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, initial-scale=1.0">
<title>XOLIFA — Màn hình khách</title>
<meta name="theme-color" content="#006241">
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-auth-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800;900&family=Bebas+Neue&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,600,1,0" rel="stylesheet">

<style>
/* ─── RESET & ROOT ─────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  /* FHD 1920x1080 */
  --screen-w: 1920px;
  --screen-h: 1080px;

  /* Brand Colors (Giữ tone xanh Xolifa thay vì màu hồng để đúng nhận diện thương hiệu) */
  --green: #006241;
  --green-dark: #004f32;
  --bg-main: #FAFAFA;
  --surface: #FFFFFF;
  --box-bg: #EAF2EF; /* Màu nền thay cho màu hồng trong layout */
  --text-main: #111827;
  --text-muted: #6B7280;
  
  --radius-lg: 32px;
  --radius-md: 20px;
  --shadow: 0 8px 24px rgba(0,0,0,0.04);
}

html, body {
  width: var(--screen-w);
  height: var(--screen-h);
  overflow: hidden;
  background: var(--bg-main);
  font-family: 'Be Vietnam Pro', sans-serif;
  pointer-events: none; /* VÔ HIỆU HÓA HOÀN TOÀN TƯƠNG TÁC */
  user-select: none;
}

#app {
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  padding: 24px;
  gap: 24px;
}

/* ─── HEADER (Top Banner) ──────────────────────────────────── */
#header-row {
  display: flex;
  height: 120px;
  gap: 24px;
  flex-shrink: 0;
}
#logo-box {
  width: 320px; /* Khớp với độ rộng cột slide trái */
  background: var(--box-bg);
  border-radius: var(--radius-lg);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 80px;
  color: var(--green);
  letter-spacing: 0.05em;
  box-shadow: var(--shadow);
}
#banner-box {
  flex: 1;
  background: var(--box-bg);
  border-radius: var(--radius-lg);
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
  box-shadow: var(--shadow);
}
#banner-box img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* ─── MAIN CONTENT ─────────────────────────────────────────── */
#main-row {
  flex: 1;
  display: flex;
  gap: 32px;
  height: calc(100% - 144px);
}

/* 1. LEFT: SLIDE CỘT DỌC */
#col-slide {
  width: 320px;
  background: #000;
  border-radius: var(--radius-lg);
  overflow: hidden;
  position: relative;
  box-shadow: var(--shadow);
}
#slide-l1, #slide-l2 {
  position: absolute; inset: 0;
  transition: opacity 1s ease-in-out;
  opacity: 0;
}
#slide-l1 img, #slide-l2 img { width: 100%; height: 100%; object-fit: cover; }
#slide-dots {
  position: absolute; bottom: 20px; left: 0; right: 0;
  display: flex; justify-content: center; gap: 8px; z-index: 10;
}
.s-dot {
  width: 10px; height: 10px; border-radius: 50%;
  background: rgba(255,255,255,0.4);
}
.s-dot.active { background: #fff; width: 24px; border-radius: 5px; }

/* 2. MIDDLE: MENU CHÍNH */
#col-menu {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 32px;
}

/* 2A. Món Nổi Bật (Top 3) */
#featured-row {
  display: flex;
  height: 240px;
  gap: 24px;
}
.feat-item {
  flex: 1;
  background: var(--box-bg);
  border-radius: var(--radius-lg);
  padding: 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  box-shadow: var(--shadow);
  position: relative;
  overflow: hidden;
}
.feat-info { z-index: 2; width: 50%; }
.feat-tag { font-size: 16px; font-weight: 800; color: var(--green); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px; }
.feat-name { font-size: 28px; font-weight: 900; color: var(--text-main); line-height: 1.2; }
.feat-img {
  width: 160px; height: 160px;
  object-fit: contain;
  position: absolute;
  right: -10px; bottom: -10px;
  filter: drop-shadow(0 10px 15px rgba(0,0,0,0.15));
}

/* 2B. Lưới Phân Loại (4 Danh Mục) */
#categories-grid {
  flex: 1;
  display: grid;
  grid-template-columns: 1fr 1fr;
  grid-template-rows: 1fr 1fr;
  gap: 0 60px;
  position: relative;
}
/* Dòng kẻ dọc ngăn cách giữa màn hình như mockup */
#categories-grid::before {
  content: "";
  position: absolute;
  top: 10%; bottom: 10%; left: 50%;
  width: 2px; background: rgba(0,0,0,0.06);
  transform: translateX(-50%);
}
/* Dòng kẻ ngang ngăn cách giữa màn hình */
#categories-grid::after {
  content: "";
  position: absolute;
  top: 50%; left: 5%; right: 5%;
  height: 2px; background: rgba(0,0,0,0.06);
  transform: translateY(-50%);
}

.cat-section { display: flex; flex-direction: column; justify-content: center; padding: 20px 0; }
.cat-title {
  font-size: 28px; font-weight: 900; color: var(--text-main);
  margin-bottom: 20px;
}
.cat-items-grid {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px;
}
.item-card {
  display: flex; flex-direction: column; align-items: center; text-align: center;
}
.item-img {
  width: 90px; height: 110px; object-fit: contain;
  margin-bottom: 12px;
  filter: drop-shadow(0 6px 10px rgba(0,0,0,0.1));
}
.item-img-placeholder {
  width: 90px; height: 110px; background: #e5e7eb; border-radius: 12px; margin-bottom: 12px;
  display: flex; align-items: center; justify-content: center; font-size: 30px;
}
.item-name { font-size: 16px; font-weight: 700; color: var(--text-main); margin-bottom: 4px; line-height: 1.2; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.item-price { font-size: 14px; font-weight: 800; color: var(--green); }

/* 3. RIGHT: ORDER/TOPPINGS PANEL */
#col-right {
  width: 320px;
  background: var(--box-bg);
  border-radius: var(--radius-lg);
  display: flex;
  flex-direction: column;
  box-shadow: var(--shadow);
  overflow: hidden;
}
.right-title {
  font-size: 24px; font-weight: 900; text-align: center; padding: 24px;
  background: var(--green); color: #fff;
}
#cart-list { flex: 1; padding: 20px; overflow: hidden; display: flex; flex-direction: column; gap: 16px; }
.cart-item { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px dashed rgba(0,0,0,0.1); padding-bottom: 12px; }
.c-qty { font-size: 16px; font-weight: 900; color: var(--green); margin-right: 12px; }
.c-name { flex: 1; font-size: 16px; font-weight: 700; }
.c-price { font-size: 16px; font-weight: 800; color: var(--text-main); }

#cart-footer { padding: 24px; background: #fff; border-top: 2px solid var(--box-bg); }
.total-label { font-size: 16px; font-weight: 700; color: var(--text-muted); }
.total-price { font-size: 36px; font-weight: 900; color: var(--green); text-align: right; margin-top: 4px; line-height: 1; }

/* ─── OVERLAYS (QR & SUCCESS) ──────────────────────────────── */
#view-qr, #view-success {
  display: none; position: absolute; inset: 0; z-index: 100;
  backdrop-filter: blur(24px); flex-direction: column; align-items: center; justify-content: center;
  animation: fadeIn 0.4s;
}
#view-qr { background: rgba(255, 255, 255, 0.9); }
#view-qr img { width: 340px; height: 340px; border-radius: 16px; margin: 30px 0; border: 4px solid var(--green); box-shadow: var(--shadow); }
#qr-amount { font-size: 64px; font-weight: 900; color: var(--green); }

#view-success { background: var(--green); color: #fff; }
#view-success .material-symbols-outlined { font-size: 160px; margin-bottom: 24px; }
#view-success h2 { font-size: 64px; font-weight: 900; letter-spacing: 0.02em; }

@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
</style>
</head>

<body>
<div id="app">

  <!-- ROW 1: HEADER & BANNER -->
  <div id="header-row">
    <div id="logo-box">XOLIFA</div>
    <div id="banner-box">
      <!-- Cập nhật ảnh Banner Ngang tại đây -->
      <img src="https://firebasestorage.googleapis.com/v0/b/the-cafe-33.firebasestorage.app/o/banner-ngang-sample.jpg?alt=media" onerror="this.style.display='none'; this.parentElement.innerHTML='<h2 style=\'color:var(--green);font-size:32px;\'>VỊ TRÍ ĐẶT BANNER DÀI NGANG</h2>'">
    </div>
  </div>

  <!-- ROW 2: MAIN CONTENT -->
  <div id="main-row">
    
    <!-- 1. SLIDE DỌC (Bên Trái) -->
    <div id="col-slide">
      <div id="slide-l1"></div>
      <div id="slide-l2"></div>
      <div id="slide-dots"></div>
    </div>

    <!-- 2. MENU CHÍNH (Giữa) -->
    <div id="col-menu">
      
      <!-- Top 3 Món Nổi Bật -->
      <div id="featured-row">
        <!-- Render bằng JS -->
      </div>

      <!-- Lưới 4 Phân Loại -->
      <div id="categories-grid">
        <!-- Render bằng JS -->
      </div>

    </div>

    <!-- 3. PANEL BÊN PHẢI (List Toppings / Đơn Hàng) -->
    <div id="col-right">
      <div class="right-title">ĐƠN HÀNG</div>
      <div id="cart-list">
        <div style="text-align:center; color:var(--text-muted); margin-top: 50px; font-weight: 700; font-size: 18px;">
          Chưa có món nào
        </div>
      </div>
      <div id="cart-footer">
        <div class="total-label">TỔNG THANH TOÁN</div>
        <div class="total-price" id="total-price">0đ</div>
      </div>
    </div>

  </div>

  <!-- OVERLAYS -->
  <div id="view-qr">
    <h2 style="font-size: 40px; font-weight: 900; color: var(--text-main);">VUI LÒNG QUÉT MÃ QR</h2>
    <img id="qr-image" src="">
    <p style="font-size:24px;font-weight:700;color:var(--text-muted);text-transform:uppercase;">Số tiền cần thanh toán</p>
    <div id="qr-amount">0đ</div>
  </div>

  <div id="view-success">
    <span class="material-symbols-outlined">check_circle</span>
    <h2>THANH TOÁN THÀNH CÔNG!</h2>
    <p style="font-size: 28px; margin-top: 16px; font-weight: 600;">Xin cảm ơn quý khách</p>
  </div>

</div>

<script>
// ══════════════════════════════════════════════════════
// FIREBASE INIT
// ══════════════════════════════════════════════════════
var firebaseConfig = {
    apiKey: "AIzaSyCNh1-16gYZ0P30Fkd-2tB-O89PXkPX9Lc",
    authDomain: "the-cafe-33.firebaseapp.com",
    databaseURL: "https://the-cafe-33-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "the-cafe-33",
    storageBucket: "the-cafe-33.appspot.com",
};
if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
var db     = firebase.database();
var fstore = firebase.firestore();
var auth   = firebase.auth();

// ══════════════════════════════════════════════════════
// STATIC MENU RENDER (THEO CHUẨN LAYOUT MỚI)
// ══════════════════════════════════════════════════════
var menuData   = [];
var menuImages = {};

function loadMenu() {
    db.ref('menu_xolifa').once('value', function(snap) {
        var raw = snap.val();
        menuData = raw ? (Array.isArray(raw) ? raw : Object.values(raw)) : [];
        loadMenuImages();
    });
}

function loadMenuImages() {
    fstore.collection('config_xolifa').doc('screen_2026').get().then(function(doc) {
        if (doc.exists && doc.data().menuImages) menuImages = doc.data().menuImages;
        renderStaticMenu();
    }).catch(function(){ renderStaticMenu(); });
}

function renderStaticMenu() {
    // 1. Lọc dữ liệu hợp lệ
    var validItems = menuData.filter(it => it && it.name && it.type);
    
    // 2. Tách 3 Món Nổi Bật (Lấy các món có tag 'Mới' hoặc 3 món đầu tiên)
    var featuredItems = validItems.filter(it => (it.type||'').toLowerCase().includes('mới') || (it.name||'').toLowerCase().includes('đặc biệt')).slice(0, 3);
    if(featuredItems.length < 3) featuredItems = validItems.slice(0, 3);

    // Render Top 3 Món
    var featContainer = document.getElementById('featured-row');
    featContainer.innerHTML = '';
    featuredItems.forEach((item, idx) => {
        var globalIdx = menuData.indexOf(item);
        var imgUrl = (menuImages[globalIdx] && menuImages[globalIdx].url) ? menuImages[globalIdx].url : 'https://firebasestorage.googleapis.com/v0/b/the-cafe-33.firebasestorage.app/o/placeholder_cup.png?alt=media'; // Thay placeholder ly cafe
        
        var price = Number(item.price || item.sell_price || 0).toLocaleString('vi-VN');
        
        featContainer.innerHTML += `
            <div class="feat-item">
                <div class="feat-info">
                    <div class="feat-tag">Món Nổi Bật ${idx+1}</div>
                    <div class="feat-name">${item.name}</div>
                    <div style="font-size:20px; font-weight:800; color:var(--green); margin-top:8px;">${price}đ</div>
                </div>
                <img src="${imgUrl}" class="feat-img" onerror="this.style.display='none'">
            </div>
        `;
    });

    // 3. Nhóm các món còn lại thành 4 Phân Loại (Categories)
    var grouped = {};
    validItems.forEach(item => {
        if(!featuredItems.includes(item)) {
            if(!grouped[item.type]) grouped[item.type] = [];
            grouped[item.type].push(item);
        }
    });

    // Lấy đúng 4 nhóm đầu tiên
    var categories = Object.keys(grouped).slice(0, 4);
    var gridContainer = document.getElementById('categories-grid');
    gridContainer.innerHTML = '';

    categories.forEach(cat => {
        // Lấy tối đa 3 món cho mỗi phân loại để vừa đẹp trên 1 dòng ngang
        var items = grouped[cat].slice(0, 3); 
        
        var itemsHTML = items.map(item => {
            var globalIdx = menuData.indexOf(item);
            var imgHtml = (menuImages[globalIdx] && menuImages[globalIdx].url) 
                ? `<img src="${menuImages[globalIdx].url}" class="item-img" onerror="this.style.display='none'">` 
                : `<div class="item-img-placeholder">☕</div>`;
            
            // Giả lập giao diện giá "15 | 20" như trong hình (Nếu không có size thì hiện giá gốc)
            var p1 = Math.floor(Number(item.price || 0) / 1000); // Rút gọn 15.000 -> 15
            var p2 = p1 + 5; // Giả lập giá size lớn
            var priceStr = p1 > 0 ? `${p1}K | ${p2}K` : 'Liên hệ';

            return `
                <div class="item-card">
                    ${imgHtml}
                    <div class="item-name">${item.name}</div>
                    <div class="item-price">${priceStr}</div>
                </div>
            `;
        }).join('');

        gridContainer.innerHTML += `
            <div class="cat-section">
                <div class="cat-title">${cat}</div>
                <div class="cat-items-grid">${itemsHTML}</div>
            </div>
        `;
    });
}

// ══════════════════════════════════════════════════════
// SLIDES (Cột dọc bên trái)
// ══════════════════════════════════════════════════════
var DEFAULT_SLIDES = [
    { type:'image', src:'https://firebasestorage.googleapis.com/v0/b/the-cafe-33.firebasestorage.app/o/1768316658706.jpg?alt=media', duration:6000 },
    { type:'image', src:'https://firebasestorage.googleapis.com/v0/b/the-cafe-33.firebasestorage.app/o/1770299826548.jpg?alt=media', duration:6000 }
];
var slidePlaylist = DEFAULT_SLIDES.slice(), slideIndex = -1, slideActiveLayer = 1, slideTimer = null;

function nextSlide() {
    if (!slidePlaylist.length) return;
    slideIndex = (slideIndex + 1) % slidePlaylist.length;
    var dots = document.querySelectorAll('.s-dot');
    dots.forEach(function(d,i){ d.classList.toggle('active', i===slideIndex); });
    
    var item = slidePlaylist[slideIndex];
    var backId = slideActiveLayer === 1 ? 'slide-l2' : 'slide-l1';
    var frontId = slideActiveLayer === 1 ? 'slide-l1' : 'slide-l2';
    var backEl = document.getElementById(backId), frontEl = document.getElementById(frontId);
    backEl.innerHTML = '';
    
    var el = new Image();
    el.src = item.src;
    el.onload = function(){
        backEl.style.opacity = '1';
        setTimeout(function(){ frontEl.style.opacity = '0'; }, 100);
        slideActiveLayer = slideActiveLayer === 1 ? 2 : 1;
        slideTimer = setTimeout(nextSlide, item.duration);
    };
    backEl.appendChild(el);
}

// ══════════════════════════════════════════════════════
// POS LISTENER (Cart / Toppings Right Panel)
// ══════════════════════════════════════════════════════
auth.signInWithEmailAndPassword("elio@thecafe33.com", "Thecafe33ty").then(function() {
    document.getElementById('slide-dots').innerHTML = slidePlaylist.map(function(s,i){ return '<div class="s-dot '+(i===0?'active':'')+'"></div>' }).join('');
    nextSlide();
    loadMenu();
    listenToPOS();
});

function listenToPOS() {
    db.ref('session_display').on('value', function(snap) {
        var data = snap.val();
        if (!data || data.state === 'idle') { resetScreen(); return; }

        if (data.state === 'qr_payment') {
            document.getElementById('view-qr').style.display = 'flex';
            document.getElementById('qr-image').src = data.qrUrl || '';
            document.getElementById('qr-amount').textContent = Number(data.amount||0).toLocaleString('vi-VN') + 'đ';
            return;
        }
        if (data.state === 'success') {
            document.getElementById('view-qr').style.display = 'none';
            document.getElementById('view-success').style.display = 'flex';
            setTimeout(function(){ resetScreen(); }, 5000);
            return;
        }
        
        document.getElementById('view-qr').style.display = 'none';
        document.getElementById('view-success').style.display = 'none';
        renderCart(data);
    });
}

function renderCart(data) {
    document.getElementById('total-price').textContent = Number(data.total || 0).toLocaleString('vi-VN') + 'đ';

    var listEl = document.getElementById('cart-list');
    var cart = data.cart || [];

    if (cart.length === 0) {
        listEl.innerHTML = '<div style="text-align:center; color:var(--text-muted); margin-top: 50px; font-weight: 700; font-size: 18px;">Chưa có món nào</div>';
        return;
    }

    listEl.innerHTML = '';
    cart.forEach(function(item) {
        var sizeStr = item.size ? ` (${item.size})` : '';
        var div = document.createElement('div');
        div.className = 'cart-item';
        div.innerHTML = `
            <div style="display:flex; align-items:center;">
                <span class="c-qty">${item.qty||1}x</span>
                <span class="c-name">${(item.name||'') + sizeStr}</span>
            </div>
            <span class="c-price">${((item.price||0)*(item.qty||1)).toLocaleString('vi-VN')}đ</span>
        `;
        listEl.appendChild(div);
    });
}

function resetScreen() {
    document.getElementById('view-qr').style.display = 'none';
    document.getElementById('view-success').style.display = 'none';
    document.getElementById('total-price').textContent = '0đ';
    document.getElementById('cart-list').innerHTML = '<div style="text-align:center; color:var(--text-muted); margin-top: 50px; font-weight: 700; font-size: 18px;">Chưa có món nào</div>';
}
</script>
</body>
</html>
