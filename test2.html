<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>XOLIFA — Màn hình khách (Smart Layout & Fit TV)</title>
<meta name="theme-color" content="#006241">
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-auth-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800;900&family=Bebas+Neue&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,600,1,0" rel="stylesheet">

<style>
/* ─── RESET CƠ BẢN ─────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100vw; height: 100vh;
  margin: 0; padding: 0; overflow: hidden;
  background: #000;
  font-family: 'Be Vietnam Pro', sans-serif;
  pointer-events: none; /* Khóa tương tác người dùng */
  user-select: none;
}

:root {
  --green: #006241;
  --green-dark: #004f32;
  --surface: #FFFFFF;
  --box-bg: #EAF2EF;
  --text-main: #111827;
  --text-muted: #6B7280;
  --shadow: 0 4px 16px rgba(0,0,0,0.06);
  --radius: 24px;
}

/* ─── KHUNG CANVAS (1920x1080 CHUẨN) ───────────────────────── */
#app {
  position: absolute; top: 0; left: 0;
  width: 1920px; height: 1080px;
  background: #F4F7F5; padding: 30px;
  display: flex; flex-direction: column; gap: 30px;
  transform-origin: top left;
}

/* ─── HEADER (140px) ───────────────────────────────────────── */
#header-row { display: flex; height: 140px; gap: 30px; flex-shrink: 0; }
#logo-box {
  width: 360px; background: var(--surface); border-radius: var(--radius);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Bebas Neue', sans-serif; font-size: 80px; color: var(--green); letter-spacing: 0.05em; box-shadow: var(--shadow);
}
#banner-box { flex: 1; background: var(--surface); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); }
#banner-box img { width: 100%; height: 100%; object-fit: cover; }

/* ─── MAIN CONTENT (850px) ─────────────────────────────────── */
#main-row { display: flex; height: 850px; gap: 30px; }

/* 1. TRÁI: SLIDE (360px) */
#col-slide {
  width: 360px; background: #000; border-radius: var(--radius);
  overflow: hidden; position: relative; box-shadow: var(--shadow); flex-shrink: 0;
}
#slide-l1, #slide-l2 { position: absolute; inset: 0; transition: opacity 1s ease-in-out; opacity: 0; }
#slide-l1 img, #slide-l2 img { width: 100%; height: 100%; object-fit: cover; }
#slide-dots { position: absolute; bottom: 20px; left: 0; right: 0; display: flex; justify-content: center; gap: 8px; z-index: 10; }
.s-dot { width: 12px; height: 12px; border-radius: 50%; background: rgba(255,255,255,0.4); }
.s-dot.active { background: #fff; width: 28px; border-radius: 6px; }

/* 2. GIỮA: MENU (1040px) */
#col-menu { width: 1040px; display: flex; flex-direction: column; gap: 30px; flex-shrink: 0; }

/* Top 3 Món */
#featured-row { display: flex; height: 260px; gap: 30px; flex-shrink: 0;}
.feat-item {
  flex: 1; background: var(--surface); border-radius: var(--radius); padding: 30px;
  display: flex; align-items: center; box-shadow: var(--shadow); position: relative; overflow: hidden;
}
.feat-info { z-index: 2; width: 60%; }
.feat-name { font-size: 26px; font-weight: 800; color: var(--text-main); line-height: 1.3; margin-bottom: 8px; }
.feat-price { font-size: 22px; font-weight: 900; color: var(--green); }
.feat-img { width: 170px; height: 170px; object-fit: contain; position: absolute; right: -10px; bottom: -10px; filter: drop-shadow(0 15px 20px rgba(0,0,0,0.15)); }

/* KHUNG DANH MỤC THÔNG MINH */
#categories-grid-container {
  height: 560px; position: relative; background: var(--surface); border-radius: var(--radius);
  padding: 30px; box-shadow: var(--shadow);
  display: flex; flex-direction: column; align-items: stretch;
}
/* Trục ngăn cách chính giữa mô phỏng layout ảnh */
#categories-grid-container::before {
  content: ""; position: absolute; top: 30px; bottom: 30px; left: 50%;
  width: 2px; background: rgba(0,0,0,0.06); transform: translateX(-50%); z-index: 0;
}

#categories-masonry {
  column-count: 2; column-gap: 60px; 
  width: 100%; transform-origin: top center; 
  /* Sẽ được JS scale nếu height vượt quá 500px */
}

.cat-section { break-inside: avoid; margin-bottom: 30px; position: relative; z-index: 1; }
.cat-title { font-size: 26px; font-weight: 900; color: var(--text-main); margin-bottom: 16px; text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 2px dashed rgba(0,98,65,0.2); padding-bottom: 8px;}
.cat-items-grid { 
  display: grid; 
  grid-template-columns: repeat(3, 1fr); /* Ép 3 món 1 dòng */
  gap: 16px 10px; 
}
.item-card { display: flex; flex-direction: column; align-items: center; text-align: center; }
.item-img { width: 85px; height: 100px; object-fit: contain; margin-bottom: 8px; filter: drop-shadow(0 6px 10px rgba(0,0,0,0.08)); }
.item-img-placeholder { width: 85px; height: 100px; background: var(--box-bg); border-radius: 12px; margin-bottom: 8px; display: flex; align-items: center; justify-content: center; font-size: 30px; }
.item-name { font-size: 16px; font-weight: 700; color: var(--text-main); margin-bottom: 4px; line-height: 1.2; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.item-price { font-size: 15px; font-weight: 800; color: var(--green); }

/* 3. PHẢI: ĐƠN HÀNG (400px) */
#col-right {
  width: 400px; background: var(--surface); border-radius: var(--radius);
  display: flex; flex-direction: column; box-shadow: var(--shadow); overflow: hidden; flex-shrink: 0;
}
.right-title { font-size: 24px; font-weight: 900; text-align: center; padding: 24px; background: var(--green); color: #fff; letter-spacing: 0.05em; }
#cart-list { flex: 1; padding: 24px; overflow: hidden; display: flex; flex-direction: column; gap: 16px; }
.cart-item { display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 1px dashed rgba(0,0,0,0.1); padding-bottom: 16px; }
.c-qty { width: 32px; height: 32px; background: var(--box-bg); color: var(--green-dark); display: flex; align-items: center; justify-content: center; border-radius: 6px; font-size: 16px; font-weight: 900; margin-right: 12px; flex-shrink: 0; }
.c-name { flex: 1; font-size: 18px; font-weight: 700; line-height: 1.3; color: var(--text-main); }
.c-size { display: block; font-size: 14px; font-weight: 600; color: var(--text-muted); margin-top: 4px; }
.c-price { font-size: 18px; font-weight: 900; color: var(--text-main); margin-left: 10px; white-space: nowrap; }

#cart-footer { padding: 30px; background: var(--box-bg); }
.total-label { font-size: 18px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; }
.total-price { font-size: 48px; font-weight: 900; color: var(--green); text-align: right; margin-top: 4px; line-height: 1; letter-spacing: -0.02em; }

/* ─── OVERLAYS ─────────────────────────────────────────────── */
#view-qr, #view-success {
  display: none; position: absolute; inset: 0; z-index: 100;
  backdrop-filter: blur(24px); flex-direction: column; align-items: center; justify-content: center;
}
#view-qr { background: rgba(244, 247, 245, 0.95); }
#view-qr img { width: 400px; height: 400px; border-radius: 20px; margin: 40px 0; border: 4px solid var(--green); box-shadow: var(--shadow); }
#qr-amount { font-size: 80px; font-weight: 900; color: var(--green); letter-spacing: -0.02em; }
#view-success { background: var(--green); color: #fff; }
#view-success .material-symbols-outlined { font-size: 200px; margin-bottom: 30px; }
#view-success h2 { font-size: 80px; font-weight: 900; letter-spacing: 0.02em; }
</style>
</head>

<body>
<div id="app">
  <!-- ROW 1 -->
  <div id="header-row">
    <div id="logo-box">XOLIFA</div>
    <div id="banner-box">
      <img src="https://firebasestorage.googleapis.com/v0/b/the-cafe-33.firebasestorage.app/o/banner-ngang-sample.jpg?alt=media" onerror="this.src='https://images.unsplash.com/photo-1497935586351-b67a49e012bf?auto=format&fit=crop&w=1500&q=80'">
    </div>
  </div>

  <!-- ROW 2 -->
  <div id="main-row">
    <div id="col-slide">
      <div id="slide-l1"></div>
      <div id="slide-l2"></div>
      <div id="slide-dots"></div>
    </div>

    <div id="col-menu">
      <div id="featured-row"></div>
      <div id="categories-grid-container">
        <div id="categories-masonry"></div>
      </div>
    </div>

    <div id="col-right">
      <div class="right-title">ĐƠN HÀNG HIỆN TẠI</div>
      <div id="cart-list">
        <div style="text-align:center; color:var(--text-muted); margin-top: 80px; font-weight: 700; font-size: 20px;">
          <span class="material-symbols-outlined" style="font-size: 60px; opacity: 0.3; display:block; margin-bottom: 10px;">receipt_long</span>
          Chưa có món nào
        </div>
      </div>
      <div id="cart-footer">
        <div class="total-label">TỔNG THANH TOÁN</div>
        <div class="total-price" id="total-price">0đ</div>
      </div>
    </div>
  </div>

  <div id="view-qr">
    <h2 style="font-size: 48px; font-weight: 900; color: var(--text-main);">VUI LÒNG QUÉT MÃ QR</h2>
    <img id="qr-image" src="">
    <p style="font-size:28px;font-weight:700;color:var(--text-muted);text-transform:uppercase;">Số tiền thanh toán</p>
    <div id="qr-amount">0đ</div>
  </div>
  <div id="view-success">
    <span class="material-symbols-outlined">check_circle</span>
    <h2>THANH TOÁN THÀNH CÔNG!</h2>
    <p style="font-size: 32px; margin-top: 20px; font-weight: 600;">Xolifa xin chân thành cảm ơn quý khách</p>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════
// 1. ÉP KHUNG VỪA MÀN HÌNH (SCALE TO FIT TV SCREEN)
// ══════════════════════════════════════════════════════
function scaleToFit() {
    var app = document.getElementById('app');
    var scale = Math.min(window.innerWidth / 1920, window.innerHeight / 1080);
    app.style.transform = "scale(" + scale + ")";
    app.style.left = ((window.innerWidth - (1920 * scale)) / 2) + "px";
    app.style.top = ((window.innerHeight - (1080 * scale)) / 2) + "px";
}
window.addEventListener('resize', scaleToFit);
scaleToFit();

// ══════════════════════════════════════════════════════
// 2. FIREBASE INIT
// ══════════════════════════════════════════════════════
var firebaseConfig = {
    apiKey: "AIzaSyCNh1-16gYZ0P30Fkd-2tB-O89PXkPX9Lc",
    authDomain: "the-cafe-33.firebaseapp.com",
    databaseURL: "https://the-cafe-33-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "the-cafe-33",
    storageBucket: "the-cafe-33.appspot.com",
};
if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
var db     = firebase.database();
var fstore = firebase.firestore();
var auth   = firebase.auth();

// ══════════════════════════════════════════════════════
// 3. THUẬT TOÁN LẤY GIÁ TIỀN CHÍNH XÁC TỪ RTDB
// ══════════════════════════════════════════════════════
function extractRealPrice(item) {
    // Tìm các key giá phổ biến
    var p = item.price || item.sell_price || item.Price || item.basePrice;
    
    // Nếu lưu ở định dạng mảng size: [{name: 'M', price: 20000}]
    if (!p && item.sizes && Array.isArray(item.sizes) && item.sizes.length > 0) {
        p = item.sizes[0].price;
    }
    // Nếu lưu ở dạng object size: { 'size_m': {price: 20000} }
    if (!p && item.sizes && typeof item.sizes === 'object') {
        var keys = Object.keys(item.sizes);
        if (keys.length > 0) {
            p = item.sizes[keys[0]].price || item.sizes[keys[0]];
        }
    }
    
    if (!p) return 0;
    
    // Nếu giá vô tình bị lưu dưới dạng chuỗi có dấu phẩy: "25,000"
    if (typeof p === 'string') {
        p = p.replace(/[^0-9]/g, ''); // Xóa mọi ký tự ko phải số
    }
    return Number(p) || 0;
}

// ══════════════════════════════════════════════════════
// 4. RENDER MENU VÀ AUTO-SHRINK KHUNG
// ══════════════════════════════════════════════════════
var menuData = [];
var menuImages = {};

function loadMenu() {
    db.ref('menu_xolifa').once('value', function(snap) {
        var raw = snap.val();
        menuData = raw ? (Array.isArray(raw) ? raw : Object.values(raw)) : [];
        loadMenuImages();
    });
}

function loadMenuImages() {
    fstore.collection('config_xolifa').doc('screen_2026').get().then(function(doc) {
        if (doc.exists && doc.data().menuImages) menuImages = doc.data().menuImages;
        renderSmartMenu();
    }).catch(function(){ renderSmartMenu(); });
}

function renderSmartMenu() {
    var validItems = menuData.filter(it => it && it.name && it.type);
    
    // TOP 3 MÓN NỔI BẬT
    var featuredItems = validItems.filter(it => (it.type||'').toLowerCase().includes('mới') || (it.name||'').toLowerCase().includes('đặc biệt')).slice(0, 3);
    if(featuredItems.length < 3) featuredItems = validItems.slice(0, 3);

    var featContainer = document.getElementById('featured-row');
    featContainer.innerHTML = '';
    featuredItems.forEach((item) => {
        var globalIdx = menuData.indexOf(item);
        var imgUrl = (menuImages[globalIdx] && menuImages[globalIdx].url) ? menuImages[globalIdx].url : 'https://firebasestorage.googleapis.com/v0/b/the-cafe-33.firebasestorage.app/o/placeholder.png?alt=media';
        var price = extractRealPrice(item).toLocaleString('vi-VN');
        featContainer.innerHTML += `
            <div class="feat-item">
                <div class="feat-info">
                    <div class="feat-name">${item.name}</div>
                    <div class="feat-price">${price}đ</div>
                </div>
                <img src="${imgUrl}" class="feat-img" onerror="this.style.display='none'">
            </div>
        `;
    });

    // MASONRY DANH MỤC
    var grouped = {};
    validItems.forEach(item => {
        if(!featuredItems.includes(item)) {
            if(!grouped[item.type]) grouped[item.type] = [];
            grouped[item.type].push(item);
        }
    });

    var masonryContainer = document.getElementById('categories-masonry');
    masonryContainer.innerHTML = '';
    masonryContainer.style.transform = 'scale(1)'; // Reset scale

    // In ra TẤT CẢ danh mục & TẤT CẢ các món, không dùng slice nữa
    Object.keys(grouped).forEach(catName => {
        var itemsHTML = grouped[catName].map(item => {
            var globalIdx = menuData.indexOf(item);
            var imgHtml = (menuImages[globalIdx] && menuImages[globalIdx].url) 
                ? `<img src="${menuImages[globalIdx].url}" class="item-img" onerror="this.style.display='none'">` 
                : `<div class="item-img-placeholder">☕</div>`;
            var priceStr = extractRealPrice(item).toLocaleString('vi-VN') + 'đ';
            return `
                <div class="item-card">
                    ${imgHtml}
                    <div class="item-name">${item.name}</div>
                    <div class="item-price">${priceStr}</div>
                </div>
            `;
        }).join('');

        masonryContainer.innerHTML += `
            <div class="cat-section">
                <div class="cat-title">${catName}</div>
                <div class="cat-items-grid">${itemsHTML}</div>
            </div>
        `;
    });

    // Ép khung nếu số lượng món quá lớn làm tràn chiều cao 500px
    setTimeout(() => {
        var contentHeight = masonryContainer.scrollHeight;
        if (contentHeight > 500) {
            var shrinkScale = 500 / contentHeight;
            masonryContainer.style.transform = `scale(${shrinkScale})`;
        }
    }, 100);
}

// ══════════════════════════════════════════════════════
// 5. SLIDES
// ══════════════════════════════════════════════════════
var DEFAULT_SLIDES = [
    { type:'image', src:'https://firebasestorage.googleapis.com/v0/b/the-cafe-33.firebasestorage.app/o/1768316658706.jpg?alt=media', duration:6000 },
    { type:'image', src:'https://firebasestorage.googleapis.com/v0/b/the-cafe-33.firebasestorage.app/o/1770299826548.jpg?alt=media', duration:6000 }
];
var slidePlaylist = DEFAULT_SLIDES.slice(), slideIndex = -1, slideActiveLayer = 1, slideTimer = null;

function nextSlide() {
    if (!slidePlaylist.length) return;
    slideIndex = (slideIndex + 1) % slidePlaylist.length;
    var dots = document.querySelectorAll('.s-dot');
    dots.forEach(function(d,i){ d.classList.toggle('active', i===slideIndex); });
    
    var item = slidePlaylist[slideIndex];
    var backId = slideActiveLayer === 1 ? 'slide-l2' : 'slide-l1';
    var frontId = slideActiveLayer === 1 ? 'slide-l1' : 'slide-l2';
    var backEl = document.getElementById(backId), frontEl = document.getElementById(frontId);
    backEl.innerHTML = '';
    
    var el = new Image(); el.src = item.src;
    el.onload = function(){
        backEl.style.opacity = '1';
        setTimeout(function(){ frontEl.style.opacity = '0'; }, 100);
        slideActiveLayer = slideActiveLayer === 1 ? 2 : 1;
        slideTimer = setTimeout(nextSlide, item.duration);
    };
    backEl.appendChild(el);
}

// ══════════════════════════════════════════════════════
// 6. POS LISTENER (LẮNG NGHE ĐƠN HÀNG)
// ══════════════════════════════════════════════════════
auth.signInWithEmailAndPassword("elio@thecafe33.com", "Thecafe33ty").then(function() {
    document.getElementById('slide-dots').innerHTML = slidePlaylist.map(function(s,i){ return '<div class="s-dot '+(i===0?'active':'')+'"></div>' }).join('');
    nextSlide(); loadMenu(); listenToPOS();
});

function listenToPOS() {
    db.ref('session_display').on('value', function(snap) {
        var data = snap.val();
        if (!data || data.state === 'idle') { resetScreen(); return; }

        if (data.state === 'qr_payment') {
            document.getElementById('view-qr').style.display = 'flex';
            document.getElementById('qr-image').src = data.qrUrl || '';
            document.getElementById('qr-amount').textContent = Number(data.amount||0).toLocaleString('vi-VN') + 'đ';
            return;
        }
        if (data.state === 'success') {
            document.getElementById('view-qr').style.display = 'none';
            document.getElementById('view-success').style.display = 'flex';
            setTimeout(function(){ resetScreen(); }, 5000);
            return;
        }
        
        document.getElementById('view-qr').style.display = 'none';
        document.getElementById('view-success').style.display = 'none';
        renderCart(data);
    });
}

function renderCart(data) {
    document.getElementById('total-price').textContent = Number(data.total || 0).toLocaleString('vi-VN') + 'đ';
    var listEl = document.getElementById('cart-list');
    var cart = data.cart || [];

    if (cart.length === 0) { resetScreen(); return; }

    listEl.innerHTML = '';
    cart.forEach(function(item) {
        var sizeStr = item.size ? `<span class="c-size">Size: ${item.size}</span>` : '';
        var div = document.createElement('div');
        div.className = 'cart-item';
        div.innerHTML = `
            <div class="c-qty">${item.qty||1}</div>
            <div style="flex:1;">
                <div class="c-name">${item.name||''}</div>
                ${sizeStr}
            </div>
            <div class="c-price">${((item.price||0)*(item.qty||1)).toLocaleString('vi-VN')}đ</div>
        `;
        listEl.appendChild(div);
    });
}

function resetScreen() {
    document.getElementById('view-qr').style.display = 'none';
    document.getElementById('view-success').style.display = 'none';
    document.getElementById('total-price').textContent = '0đ';
    document.getElementById('cart-list').innerHTML = `
        <div style="text-align:center; color:var(--text-muted); margin-top: 80px; font-weight: 700; font-size: 20px;">
            <span class="material-symbols-outlined" style="font-size: 60px; opacity: 0.3; display:block; margin-bottom: 10px;">receipt_long</span>
            Chưa có món nào
        </div>`;
}
</script>
</body>
</html>
